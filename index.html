<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiksMusik</title>
    <style>
        :root {
            --primary: #1DB954; /* Spotify Grøn */
            --bg: #121212;
            --card: #181818;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Fastgjort top så søgefeltet altid er øverst */
        .header {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding-bottom: 20px;
            z-index: 100;
            border-bottom: 1px solid #282828;
            margin-bottom: 20px;
        }

        h2 { margin: 10px 0 5px 0; font-size: 24px; font-weight: 800; }

        .count { font-size: 13px; color: var(--text-dim); margin-bottom: 15px; }

        #search { 
            width: 100%; 
            padding: 16px 20px; 
            box-sizing: border-box;
            border-radius: 12px; 
            border: 1px solid #333; 
            font-size: 17px;
            background: #282828; 
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        #search:focus { border-color: var(--primary); background: #333; }

        /* Sang-kortene */
        .song-item { 
            background: var(--card); 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid #222;
            transition: transform 0.1s;
        }

        .song-item:active { transform: scale(0.98); background: #222; }

        .title { 
            font-weight: 700; 
            display: block; 
            margin-bottom: 8px; 
            font-size: 16px; 
            color: var(--primary);
        }

        .path-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }

        .path { 
            color: #ddd; 
            font-size: 12px; 
            word-break: break-all; 
            font-family: 'SF Mono', Menlo, monospace;
            line-height: 1.4;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            display: block;
        }

        /* Besked når intet findes */
        .no-results {
            text-align: center;
            color: var(--text-dim);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎵 MiksMusik Arkiv</h2>
        <div id="stat" class="count">Indlæser database...</div>
        <input type="text" id="search" placeholder="Søg efter artist eller sang..." onkeyup="search()">
    </div>

    <div id="results"></div>

    <script src="musik_data.js"></script>
    
    <script>
        const statEl = document.getElementById('stat');
        const resultsDiv = document.getElementById('results');
        
        // Opdater statustallet
        if (typeof mineSange !== 'undefined') {
            statEl.innerText = mineSange.length.toLocaleString() + " mp3-filer fundet på MiksMusik";
        } else {
            statEl.innerText = "Fejl: Kunne ikke finde musik_data.js";
        }

        function search() {
            const query = document.getElementById('search').value.toLowerCase();
            resultsDiv.innerHTML = '';

            // Start først søgning efter 2 bogstaver
            if (query.length < 2) return;

            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));

            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Ingen sange fundet...</div>';
                return;
            }

            // Vis de første 100 resultater (for at holde telefonen hurtig)
            matches.slice(0, 100).forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <span class="title">${s.navn}</span>
                    <span class="path-label">Placering på disk:</span>
                    <span class="path">${s.sti}</span>
                `;
                resultsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
