<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,400&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <title>MiksMusik Elite</title>
    <style>
        :root {
            --gold: #c5a059;
            --platinum: #e5e5e5;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --header-height: 140px;
        }
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -10%, rgba(197, 160, 89, 0.25) 0%, transparent 50%), url('m_logo.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--platinum); margin: 0; padding: 20px; padding-bottom: 180px;
            -webkit-font-smoothing: antialiased;
        }
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 450px;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12) 0%, transparent 70%);
            pointer-events: none; z-index: 1;
        }
        .header { text-align: center; padding: 60px 0 30px; position: relative; z-index: 2; }
        .header-logo { width: 90px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.3)); }
        .logo-text {
            font-family: 'Bodoni Moda', serif; font-size: 40px; font-weight: 900;
            text-transform: uppercase; margin: 0; display: flex; justify-content: center; gap: 10px;
        }
        .logo-text .miks { color: var(--platinum); font-style: italic; font-weight: 400; }
        .logo-text .musik { 
            color: var(--gold); background: linear-gradient(to bottom, #f1d39b, #96702d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #results { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 2; }
        .song-item { 
            background: var(--glass); padding: 18px; border-radius: 25px; 
            border: 1px solid rgba(197, 160, 89, 0.15); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .cover-art { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .song-info { flex: 1; min-width: 0; }
        .title { font-weight: 800; font-size: 16px; color: var(--platinum); margin-bottom: 4px; }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            background: rgba(255,255,255,0.03); color: var(--gold); border: 1px solid rgba(197,160,89,0.25);
            padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 800; flex: 1; text-transform: uppercase;
        }
        .footer {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(10, 10, 10, 0.9); padding: 15px; border-radius: 35px;
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        #search { 
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            background: rgba(255,255,255,0.06); color: white; font-size: 18px;
            text-align: center; outline: none; box-sizing: border-box;
        }
        .stat-text { text-align: center; font-size: 10px; color: var(--gold); margin-bottom: 8px; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="spotlight"></div>
    <div class="header">
        <img src="m_logo.PNG" class="header-logo">
        <h1 class="logo-text"><span class="miks">Miks</span><span class="musik">Musik</span></h1>
    </div>
    <div id="results"></div>
    <div class="footer">
        <div class="stat-text" id="stat">SYSTEM READY</div>
        <input type="text" id="search" placeholder="FIND DIT TRACK..." onkeyup="handleSearch()" autocomplete="off">
    </div>
    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        if (typeof mineSange !== 'undefined') {
            document.getElementById('stat').innerText = mineSange.length.toLocaleString() + " TRACKS ANALYZED";
        }
        function handleSearch() {
            const query = searchInput.value.toLowerCase();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 30));
        }
        async function fetchCover(songName, imgElement) {
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(songName)}&entity=song&limit=1`);
                const data = await res.json();
                if (data.results[0]) imgElement.src = data.results[0].artworkUrl100.replace('100x100', '300x300');
            } catch (e) { imgElement.src = 'm_logo.PNG'; }
        }
        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                const imgId = 'img-' + Math.random().toString(36).substr(2, 5);
                div.innerHTML = `<img src="m_logo.PNG" class="cover-art" id="${imgId}"><div class="song-info"><div class="title">${s.navn}</div><div class="path">${s.sti}</div><div class="btn-group"><button class="btn" onclick="copyText('${s.sti.replace(/'/g, "\\'")}')">KOPIÉR STI</button><button class="btn" onclick="showFolder('${s.sti.substring(0, s.sti.lastIndexOf('/')).replace(/'/g, "\\'")}')">VIS MAPPE</button></div></div>`;
                resultsDiv.appendChild(div);
                fetchCover(s.navn, document.getElementById(imgId));
            });
        }
        function showFolder(path) { searchInput.value = path; handleSearch(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function copyText(text) { navigator.clipboard.writeText(text); alert("Klar til pulten!"); }
    </script>
</body>
</html>
