<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE DUAL</title>
    <style>
        :root { --amber: #ff9d00; --bg: #000; --card: #111; --red: #ff3b3b; --green: #00ff88; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; padding: 0; overflow-x: hidden; position: fixed; width: 100%; height: 100%;
        }

        /* HEADER */
        .header { text-align: center; padding: 40px 0 10px; background: var(--bg); }
        .m-logo { width: 50px; filter: drop-shadow(0 0 15px var(--amber)); }

        /* SIDE-CONTAINER */
        #mainWrapper { 
            display: flex; 
            width: 200vw; 
            height: calc(100vh - 180px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .page { 
            width: 100vw; 
            height: 100%;
            overflow-y: auto; 
            padding: 0 20px 100px; 
            box-sizing: border-box; 
            -webkit-overflow-scrolling: touch;
        }

        /* SØGE-SIDE (SIDE 1) */
        .search-box { background: #1a1a1a; border-radius: 20px; border: 1px solid #333; padding: 15px; margin-bottom: 20px; }
        #search { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 18px; outline: none; font-weight: 700; }
        .result-item { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 4px solid var(--amber); }
        .res-title { font-weight: 900; color: var(--amber); font-size: 15px; margin-bottom: 4px; text-transform: uppercase; }
        .res-path { font-size: 10px; opacity: 0.4; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* SANDBOX-SIDE (SIDE 2) */
        .sandbox-card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        #reqInput { flex: 1; background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; color: #fff; outline: none; }
        .req-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; display: inline-block; }

        /* NAVIGATIONS-BAR */
        .nav-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,15,0.98); border-radius: 40px; border: 1px solid #333;
            padding: 6px; display: flex; gap: 5px; z-index: 9999; width: 300px;
            backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .nav-btn { 
            flex: 1; border: none; background: transparent; color: #666; 
            padding: 14px 0; border-radius: 35px; font-weight: 900; font-size: 12px;
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-btn.active { background: var(--amber); color: #000; }
        .btn-panic { background: var(--red) !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="header">
        <img src="m_logo.PNG" class="m-logo">
    </div>

    <div id="mainWrapper">
        
        <div class="page" id="pageSearch">
            <div style="font-size: 10px; color: var(--amber); font-weight: 900; letter-spacing: 2px; text-align: center; margin-bottom: 15px;">MUSIC SEARCH</div>
            <div class="search-box">
                <input type="text" id="search" placeholder="SØG TRACK..." onkeyup="handleSearch()" autocomplete="off">
            </div>
            <div id="searchResults"></div>
        </div>

        <div class="page" id="pageSandbox">
            <div style="font-size: 10px; color: var(--amber); font-weight: 900; letter-spacing: 2px; text-align: center; margin-bottom: 15px;">REQUEST SANDBOX</div>
            <div class="sandbox-card">
                <div class="input-group">
                    <input type="text" id="reqInput" placeholder="Gæstens ønske..." onkeypress="if(event.key==='Enter')addRequest()">
                    <button onclick="addRequest()" style="background:var(--amber); border:none; border-radius:12px; padding:0 20px; font-weight:900;">+</button>
                </div>
                <div id="reqList"></div>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="btnSearch" onclick="showPage(0)">Search</button>
        <button class="nav-btn" id="btnSandbox" onclick="showPage(1)">Sandbox</button>
        <button class="nav-btn btn-panic" onclick="triggerPanic()">SOS</button>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const wrapper = document.getElementById('mainWrapper');
        let requests = [];

        function showPage(index) {
            // Rykker hele containeren 0% eller -50% (da den er 200vw bred)
            wrapper.style.transform = `translateX(-${index * 50}%)`;
            
            document.getElementById('btnSearch').classList.toggle('active', index === 0);
            document.getElementById('btnSandbox').classList.toggle('active', index === 1);
            
            // Nulstil scroll-position når vi skifter side
            document.getElementById('pageSearch').scrollTop = 0;
            document.getElementById('pageSandbox').scrollTop = 0;
        }

        // SØGE LOGIK
        function handleSearch() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('searchResults');
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query)).slice(0, 15);
            resultsDiv.innerHTML = matches.map(s => `
                <div class="result-item" onclick="copyPath('${s.sti.replace(/'/g, "\\'")}')">
                    <div class="res-title">${s.navn}</div>
                    <div class="res-path">${s.sti}</div>
                </div>
            `).join('');
        }

        function copyPath(p) {
            navigator.clipboard.writeText(p);
            const s = document.getElementById('btnSearch');
            s.innerText = "COPIED!";
            setTimeout(() => s.innerText = "SEARCH", 1000);
        }

        // SANDBOX LOGIK
        function addRequest() {
            const input = document.getElementById('reqInput');
            if(!input.value.trim()) return;
            const hasIt = mineSange.some(s => s.navn.toLowerCase().includes(input.value.toLowerCase()));
            requests.unshift({ name: input.value, owned: hasIt, id: Date.now() });
            input.value = '';
            renderRequests();
        }

        function renderRequests() {
            document.getElementById('reqList').innerHTML = requests.map(r => `
                <div class="req-item">
                    <span><span class="status-dot" style="background:${r.owned ? 'var(--green)' : 'var(--red)'}"></span>${r.name}</span>
                    <span onclick="removeReq(${r.id})" style="padding: 5px 10px; color: #555;">✕</span>
                </div>
            `).join('');
        }
        function removeReq(id) { requests = requests.filter(r => r.id !== id); renderRequests(); }

        // SOS
        function triggerPanic() {
            showPage(0);
            const sos = mineSange.filter(s => s.navn.toLowerCase().match(/remix|club|banger/)).sort(() => 0.5 - Math.random()).slice(0, 10);
            document.getElementById('search').value = "PANIC BANGERS";
            document.getElementById('searchResults').innerHTML = sos.map(s => `
                <div class="result-item" onclick="copyPath('${s.sti.replace(/'/g, "\\'")}')">
                    <div class="res-title">${s.navn}</div>
                    <div class="res-path">${s.sti}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
