<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ff9d00; --bg: #000; --panel: #111; --border: #222; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* APP TOP BAR */
        header { 
            padding: 50px 20px 10px; 
            background: linear-gradient(to bottom, #0a0a0a, var(--bg));
            text-align: center; flex-shrink: 0;
        }
        .app-title { font-weight: 800; font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; opacity: 0.6; }

        /* FIXED SEARCH & FILTERS */
        .app-controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-input-wrap {
            background: #161616; border: 1px solid var(--border);
            border-radius: 16px; padding: 14px 20px; display: flex; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        #search {
            background: transparent; border: none; color: #fff; width: 100%;
            font-size: 16px; font-weight: 600; outline: none; text-align: center;
        }

        .filter-scroll {
            display: flex; gap: 8px; overflow-x: auto; padding: 15px 0 5px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .tab {
            background: #111; border: 1px solid var(--border); color: #555;
            padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 700;
            white-space: nowrap; transition: 0.2s;
        }
        .tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 800; }

        /* SCROLLABLE CONTENT AREA */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 0 20px 120px;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }

        .track-item {
            background: #0d0d0d; border: 1px solid #1a1a1a;
            padding: 16px; border-radius: 18px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .track-item:active { transform: scale(0.96); background: #151515; border-color: var(--gold); }
        
        .t-info { flex: 1; min-width: 0; }
        .t-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 3px; }
        .t-meta { font-size: 9px; color: #333; text-transform: uppercase; letter-spacing: 0.5px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .copy-pill {
            background: #1a1a1a; padding: 8px 12px; border-radius: 10px;
            font-size: 9px; font-weight: 800; color: var(--gold); border: 1px solid #222;
        }

        /* FLOAT NAVIGATION DOCK */
        .app-dock {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.08);
            padding: 8px; display: flex; justify-content: space-around;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .dock-btn {
            padding: 12px; border: none; background: transparent;
            color: #444; font-size: 10px; font-weight: 800; text-transform: uppercase;
        }
        .dock-btn.active { color: var(--gold); }
        .panic-btn { color: #ff3b3b !important; }

        .status-empty { text-align: center; color: #1a1a1a; margin-top: 60px; font-weight: 800; font-size: 11px; letter-spacing: 4px; }
    </style>
</head>
<body>

<header><div class="app-title">M-Elite Control</div></header>

<div class="app-controls">
    <div class="search-input-wrap">
        <input type="text" id="search" placeholder="Search Tracks..." onkeyup="filter()" autocomplete="off">
    </div>
    <div class="filter-scroll">
        <div class="tab active" onclick="setVibe('', this)">Library</div>
        <div class="tab" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">💃 House</div>
        <div class="tab" onclick="setVibe('remix', this)">🔥 Remix</div>
        <div class="tab" onclick="setVibe('retro', this)">⏪ Retro</div>
    </div>
</div>

<div id="results">
    <div class="status-empty">LOADED & READY</div>
</div>

<div class="app-dock">
    <button class="dock-btn active">Search</button>
    <button class="dock-btn" onclick="setVibe('2024', this)">New</button>
    <button class="dock-btn panic-btn" onclick="panic()">Panic</button>
</div>

<script src="musik_data.js"></script>

<script>
    let currentVibe = '';

    window.onload = function() {
        if (typeof mineSange === 'undefined') {
            document.getElementById('results').innerHTML = '<div class="status-empty" style="color:red">DATA ERROR</div>';
        }
    };

    function setVibe(vibe, el) {
        document.querySelectorAll('.tab, .dock-btn').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentVibe = vibe;
        filter();
    }

    function filter() {
        const query = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (query.length < 2 && currentVibe === '') {
            res.innerHTML = '<div class="status-empty">SELECT SOURCE</div>';
            return;
        }

        const matches = mineSange.filter(s => {
            const txt = (s.navn + s.sti).toLowerCase();
            return txt.includes(query) && txt.includes(currentVibe);
        });

        res.innerHTML = matches.slice(0, 45).map(s => `
            <div class="track-item" onclick="copyPath('${s.sti.replace(/'/g, "\\'")}')">
                <div class="t-info">
                    <div class="t-name">${s.navn}</div>
                    <div class="t-meta">${s.sti}</div>
                </div>
                <div class="copy-pill">PATH</div>
            </div>
        `).join('');
    }

    function copyPath(path) {
        navigator.clipboard.writeText(path);
        const search = document.getElementById('search');
        const original = search.placeholder;
        search.placeholder = "COPIED TO CLIPBOARD!";
        search.value = "";
        setTimeout(() => { search.placeholder = original; filter(); }, 1000);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }
</script>

</body>
</html>
