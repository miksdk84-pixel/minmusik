<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE GENIUS</title>
    <style>
        :root { --amber: #ff9d00; --plat: #ffffff; --bg: #000; --sos: #ff3b3b; --history: #00ff88; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 157, 0, 0.1) 0%, transparent 70%), url('m_logo.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--plat); margin: 0; padding: 20px; padding-bottom: 160px;
        }

        /* SOS KNAP */
        .sos-btn { 
            position: fixed; top: 25px; right: 20px; width: 65px; height: 65px; 
            background: var(--sos); border-radius: 50%; border: 3px solid #fff; 
            color: white; font-weight: 900; font-size: 13px; z-index: 2000;
            box-shadow: 0 10px 30px rgba(255, 59, 59, 0.4); display: flex; align-items: center; justify-content: center;
        }

        /* HISTORY SECTION */
        .history-bar {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            margin-bottom: 20px; scrollbar-width: none;
        }
        .history-bar::-webkit-scrollbar { display: none; }
        .history-item { 
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--history); 
            padding: 8px 15px; border-radius: 12px; font-size: 11px; white-space: nowrap; color: var(--history);
        }

        /* AI ADVISOR */
        #aiPanel { 
            background: rgba(20,20,20,0.98); border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; display: none; border: 1px solid var(--amber); 
            box-shadow: 0 0 30px rgba(255, 157, 0, 0.2);
        }

        /* TACTILE CARDS */
        .song-item { 
            background: rgba(15, 15, 15, 0.95); padding: 18px; border-radius: 22px; 
            border-left: 5px solid #333; margin-bottom: 12px; transition: 0.1s;
        }
        /* Energy Color Coding */
        .energy-high { border-left-color: var(--sos); }
        .energy-mid { border-left-color: var(--amber); }
        .energy-low { border-left-color: var(--history); }

        .song-item:active { background: var(--amber); transform: scale(0.96); }
        .title { font-weight: 900; font-size: 16px; color: var(--plat); margin-bottom: 4px; }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; }

        /* FOOTER */
        .footer { position: fixed; bottom: 25px; left: 15px; right: 15px; z-index: 1000; }
        .foot-wrap { background: rgba(10, 10, 10, 0.98); padding: 15px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(20px); }
        #search { width: 100%; padding: 15px; border-radius: 20px; border: none; background: rgba(255,255,255,0.05); color: #fff; font-size: 18px; text-align: center; outline: none; font-weight: 700; }
    </style>
</head>
<body>
    
    <button class="sos-btn" onclick="triggerSOS()">SOS</button>

    <div style="text-align:center; padding: 40px 0 10px;">
        <img src="m_logo.PNG" style="width: 70px; filter: drop-shadow(0 0 20px var(--amber));">
        <div id="stat" style="font-size: 9px; color: var(--amber); font-weight: 900; margin-top: 10px; letter-spacing: 2px;">GENIUS DJ ASSISTANT</div>
    </div>

    <div class="history-bar" id="historyBar">
        </div>

    <div id="aiPanel">
        <div id="aiContent"></div>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="foot-wrap">
            <input type="text" id="search" placeholder="SEARCH OR AI TAGS..." onkeyup="handleSearch()" autocomplete="off">
        </div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const aiPanel = document.getElementById('aiPanel');
        const historyBar = document.getElementById('historyBar');
        let playHistory = [];

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; aiPanel.style.display = 'none'; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 20));
        }

        function getEnergyClass(name) {
            const n = name.toLowerCase();
            if (n.includes('remix') || n.includes('banger') || n.includes('hype')) return 'energy-high';
            if (n.includes('club') || n.includes('extended')) return 'energy-mid';
            return 'energy-low';
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const energy = getEnergyClass(s.navn);
                const div = document.createElement('div');
                div.className = `song-item ${energy}`;
                div.innerHTML = `<div class="title">${s.navn}</div><div class="path">${s.sti}</div>`;
                div.onclick = () => copyAction(s.sti, s.navn);
                resultsDiv.appendChild(div);
            });
        }

        function copyAction(path, name) {
            navigator.clipboard.writeText(path);
            
            // Opdater Hukommelse (History)
            if (!playHistory.includes(name)) {
                playHistory.unshift(name);
                if (playHistory.length > 8) playHistory.pop();
                updateHistoryUI();
            }

            // AI Logic
            aiPanel.style.display = 'block';
            const words = name.toLowerCase().split(' ').filter(w => w.length > 4);
            const recs = mineSange.filter(s => s.navn !== name && words.some(w => s.navn.toLowerCase().includes(w))).slice(0, 2);
            
            let html = '<div style="font-size:10px; color:var(--amber); font-weight:900; margin-bottom:12px;">GENIUS COMBO • NEXT TRACK:</div>';
            recs.forEach(r => html += `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; margin-bottom:8px; font-size:13px;" onclick="event.stopPropagation(); quickS('${r.navn.replace(/'/g, "\\'")}')">🔗 ${r.navn}</div>`);
            
            if(recs.length === 0) html += '<div style="font-size:11px; opacity:0.5;">No direct combos found. Try SOS for energy.</div>';
            
            aiContent.innerHTML = html;
            document.getElementById('stat').innerText = "TRACK READY";
            setTimeout(() => { document.getElementById('stat').innerText = "GENIUS DJ ASSISTANT"; }, 1500);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updateHistoryUI() {
            historyBar.innerHTML = playHistory.map(h => `<div class="history-item" onclick="quickS('${h.replace(/'/g, "\\'")}')">🕒 ${h.substring(0, 20)}...</div>`).join('');
        }

        function quickS(n) { searchInput.value = n; handleSearch(); }

        function triggerSOS() { 
            const sos = mineSange.filter(s => s.navn.toLowerCase().match(/remix|club|banger|edit/)).slice(0, 15);
            renderResults(sos);
            searchInput.value = "";
            aiPanel.style.display = 'none';
        }
    </script>
</body>
</html>
