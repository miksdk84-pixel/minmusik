<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik AI PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --accent-gold: #ff9d00;
            --accent-deep: #350101;
            --bg-overlay: rgba(5, 5, 5, 0.92);
            --card: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 157, 0, 0.15);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: cover; background-position: center; background-attachment: fixed;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay); z-index: -1;
        }

        header { 
            padding: 50px 20px 10px; flex-shrink: 0; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .header-logo { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 5px var(--accent-gold)); }
        .app-title { font-weight: 800; font-size: 12px; letter-spacing: 3px; color: var(--accent-gold); text-transform: uppercase; }

        .controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-wrap { 
            background: rgba(35, 35, 35, 0.8); border-radius: 12px; padding: 16px; 
            display: flex; align-items: center; border: 1px solid var(--border); transition: 0.3s;
        }
        .search-wrap:focus-within { border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(255, 157, 0, 0.2); }
        #search { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; font-weight: 600; outline: none; }

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { 
            background: rgba(45, 45, 45, 0.8); color: #888; padding: 10px 18px; 
            border-radius: 25px; font-size: 11px; font-weight: 800; white-space: nowrap; border: none;
        }
        .tab.active { background: var(--accent-gold); color: #000; }

        #results { flex-grow: 1; overflow-y: auto; padding: 10px 15px 140px; }

        .track-item { 
            background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 10px;
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(5px); transition: 0.2s;
        }
        .track-item:active { transform: scale(0.98); background: var(--accent-deep); }
        .track-item.copied { border-color: var(--accent-gold); background: rgba(255, 157, 0, 0.1) !important; }
        
        .t-info { flex: 1; min-width: 0; padding-right: 15px; }
        .t-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .t-path { font-size: 9px; color: #555; text-transform: uppercase; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

        .copy-btn { background: transparent; border: none; cursor: pointer; flex-shrink: 0; opacity: 0.6; }

        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 70%, transparent);
            padding: 20px 20px 45px; display: flex; justify-content: center; 
        }
        .panic-btn { 
            background: var(--accent-gold); color: #000; border: none; padding: 16px 40px; 
            border-radius: 40px; font-weight: 800; font-size: 12px; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 157, 0, 0.3);
        }

        .status { text-align: center; color: #222; padding: 40px; font-size: 10px; font-weight: 900; letter-spacing: 4px; }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" alt="Logo" class="header-logo">
    <div class="app-title">MiksMusik AI Control</div>
</header>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="smartFilter()" autocomplete="off">
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Library</div>
        <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">House</div>
        <div class="tab" onclick="setVibe('remix', this)">Remix</div>
    </div>
</div>

<div id="results">
    <div class="status" id="status">AI IS SCANNING 9000+ TRACKS...</div>
</div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';
    let fuse;

    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            
            // INITIALISER AI SØGEMOTOR (Fuse.js)
            fuse = new Fuse(db, {
                keys: ['navn', 'sti'],
                threshold: 0.3, // Gør den "fuzzy" (0.0 = perfekt match, 1.0 = alt matcher)
                distance: 100
            });

            document.getElementById('status').innerHTML = "AI SYSTEM ONLINE // " + db.length + " TRACKS";
            smartFilter();
        } catch (e) {
            document.getElementById('status').innerHTML = "SYSTEM ERROR";
        }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        smartFilter();
    }

    function smartFilter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status">AI IS READY FOR NEXT TRACK</div>';
            return;
        }

        let matches;
        if (q.length >= 2) {
            // BRUG AI TIL SØGNING
            const aiResults = fuse.search(q);
            matches = aiResults.map(r => r.item);
        } else {
            matches = db;
        }

        // Filter på genre (vibe)
        if (vibe) {
            matches = matches.filter(s => (s.navn + s.sti).toLowerCase().includes(vibe));
        }

        res.innerHTML = matches.slice(0, 40).map(s => `
            <div class="track-item">
                <div class="t-info">
                    <div class="t-name">${s.navn || 'Unknown'}</div>
                    <div class="t-path">${s.sti || ''}</div>
                </div>
                <button class="copy-btn" onclick="copy(this.parentElement, '${(s.sti || '').replace(/'/g, "\\'")}')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
        `).join('');
    }

    function copy(el, p) {
        navigator.clipboard.writeText(p);
        el.classList.add('copied');
        const search = document.getElementById('search');
        const old = search.placeholder;
        search.placeholder = "AI COPIED TRACK!";
        setTimeout(() => { 
            el.classList.remove('copied');
            search.placeholder = old;
        }, 1000);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
