<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE COMMAND PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #000; 
            --card: #0a0a0a;
            --border: #1a1a1a;
            --text-dim: #444;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* COMPACT HEADER */
        header { 
            padding: 45px 20px 5px; 
            text-align: left; 
            border-bottom: 1px solid var(--border);
        }
        .app-title { 
            font-weight: 800; font-size: 10px; letter-spacing: 3px; 
            color: var(--accent); text-transform: uppercase;
        }

        /* SEARCH AREA */
        .controls { padding: 15px 20px; background: rgba(0,0,0,0.5); }
        .search-wrap { 
            background: #111; 
            border: 1px solid var(--border); 
            border-radius: 14px; padding: 12px 15px; display: flex; align-items: center; 
        }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 16px; font-weight: 600; outline: none;
        }

        /* CATEGORY PILLS */
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: #0a0a0a; border: 1px solid var(--border); color: var(--text-dim); 
            padding: 8px 16px; border-radius: 10px; font-size: 10px; 
            font-weight: 800; white-space: nowrap; text-transform: uppercase;
        }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* OPTIMIZED TRACK LIST */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 5px 20px 120px; 
            -webkit-overflow-scrolling: touch;
        }
        .track { 
            background: var(--card); border-bottom: 1px solid var(--border); 
            padding: 14px 10px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.1s;
        }
        .track:active { background: rgba(0, 242, 255, 0.2); }
        .track.copied { background: var(--accent) !important; color: #000 !important; }
        
        .t-info { flex: 1; min-width: 0; }
        .t-name { font-weight: 700; font-size: 13px; color: #eee; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-path { font-size: 8px; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .copy-hint { font-size: 8px; font-weight: 900; color: var(--accent); opacity: 0.5; }

        /* PROFESSIONAL DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            padding: 15px 20px 35px; display: flex; justify-content: space-around; 
        }
        .dock-btn { 
            border: none; background: transparent; color: var(--text-dim); 
            font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .dock-btn.active { color: var(--accent); }
        .panic-btn { color: #ff3b3b !important; }

        .status { font-size: 8px; color: #222; text-align: center; margin-top: 40px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header><div class="app-title">M-Elite Command Center</div></header>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="SEARCH 9000+ TRACKS..." onkeyup="filter()" autocomplete="off">
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Library</div>
        <div class="tab" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">💃 House</div>
        <div class="tab" onclick="setVibe('remix', this)">🔥 Remix</div>
        <div class="tab" onclick="setVibe('retro', this)">⏪ Retro</div>
    </div>
</div>

<div id="results">
    <div class="status" id="status">INITIALIZING DATABASE...</div>
</div>

<div class="dock">
    <button class="dock-btn active" onclick="location.reload()">
        <span>SEARCH</span>
    </button>
    <button class="dock-btn" onclick="setVibe('2024', null)">
        <span>NEWEST</span>
    </button>
    <button class="dock-btn panic-btn" onclick="panic()">
        <span>PANIC</span>
    </button>
</div>

<script>
    let db = [];
    let vibe = '';

    // VI BEHOLDER DIN RECOVERY NØGLE SÅ ALT VIRKER
    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            document.getElementById('status').innerHTML = db.length + " TRACKS READY";
            filter();
        } catch (e) {
            document.getElementById('status').innerHTML = "OFFLINE MODE";
        }
    }

    function setVibe(v, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status">READY FOR SELECTION</div>';
            return;
        }
        const matches = db.filter(s => {
            const txt = ((s.navn || '') + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });
        res.innerHTML = matches.slice(0, 60).map(s => `
            <div class="track" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div class="t-info">
                    <div class="t-name">${s.navn || 'Unknown'}</div>
                    <div class="t-path">${s.sti || ''}</div>
                </div>
                <div class="copy-hint">COPY</div>
            </div>
        `).join('');
    }

    function copy(el, p) {
        navigator.clipboard.writeText(p);
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 200);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', null);
    }

    init();
</script>

</body>
</html>
