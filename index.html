<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE NEURAL</title>
    <style>
        :root { --amber: #ff9d00; --plat: #ffffff; --bg: #000; --sos: #ff0044; --cyan: #00f2ff; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            color: var(--plat); margin: 0; padding: 20px; padding-bottom: 160px;
            overflow-x: hidden; -webkit-user-select: none;
        }

        /* NEURAL BACKGROUND ANIMATION */
        .neural-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255, 157, 0, 0.15) 0%, transparent 70%), url('m_logo.PNG');
            background-size: cover; background-position: center; opacity: 0.6; z-index: -1;
            filter: grayscale(0.5) contrast(1.2);
        }

        /* PULSERENDE SOS / PANIC KNAP */
        .sos-btn { 
            position: fixed; top: 30px; right: 20px; width: 60px; height: 60px; 
            background: var(--sos); border-radius: 18px; border: 2px solid #fff; 
            color: white; font-weight: 900; font-size: 11px; z-index: 2000;
            box-shadow: 0 0 30px var(--sos); display: flex; align-items: center; justify-content: center;
            transform: rotate(5deg); transition: 0.2s;
        }
        .sos-btn:active { transform: scale(0.8) rotate(0deg); filter: brightness(2); }

        /* HISTORY DISKRET TOP BAR */
        .history-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            margin-bottom: 20px; scrollbar-width: none;
        }
        .history-chip { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            padding: 6px 12px; border-radius: 10px; font-size: 10px; white-space: nowrap; color: #fff;
        }

        /* AI COCKPIT PANEL */
        #aiPanel { 
            background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(0,0,0,1) 100%);
            border-radius: 25px; padding: 20px; margin-bottom: 25px; display: none;
            border: 1px solid var(--cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            animation: warpIn 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes warpIn { from { transform: scale(1.1) translateY(-20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* NEURAL CARDS */
        .song-item { 
            background: rgba(15, 15, 15, 0.8); padding: 22px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.08); margin-bottom: 15px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: relative; transition: 0.2s;
        }
        .song-item.heat { border-color: var(--amber); box-shadow: 0 0 20px rgba(255, 157, 0, 0.15); }
        .song-item:active { background: var(--plat); color: #000; transform: translateX(10px); }
        .song-item:active .title, .song-item:active .path { color: #000; }

        .title { font-weight: 900; font-size: 18px; color: var(--amber); margin-bottom: 5px; letter-spacing: -0.5px; }
        .path { font-size: 10px; color: rgba(255,255,255,0.4); font-family: monospace; }

        /* FOOTER COCKPIT */
        .footer { position: fixed; bottom: 30px; left: 15px; right: 15px; z-index: 1000; }
        .foot-wrap { 
            background: rgba(10, 10, 10, 0.95); padding: 10px; border-radius: 40px; 
            border: 1px solid var(--amber); box-shadow: 0 0 40px rgba(255, 157, 0, 0.2);
        }
        #search { 
            width: 100%; padding: 18px; border-radius: 32px; border: none; 
            background: transparent; color: #fff; font-size: 20px; text-align: center; 
            outline: none; font-weight: 800; text-transform: uppercase;
        }
    </style>
</head>
<body>
    
    <div class="neural-bg"></div>
    <button class="sos-btn" onclick="triggerSOS()">PANIC</button>

    <div style="text-align:center; padding: 40px 0 10px;">
        <img src="m_logo.PNG" style="width: 80px; filter: drop-shadow(0 0 30px var(--amber));">
        <div id="stat" style="font-size: 10px; color: var(--amber); font-weight: 900; margin-top: 10px; letter-spacing: 3px;">M-ELITE NEURAL ENGINE V3</div>
    </div>

    <div class="history-scroll" id="historyBar"></div>

    <div id="aiPanel">
        <div id="aiContent"></div>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="foot-wrap">
            <input type="text" id="search" placeholder="NEURAL SEARCH..." onkeyup="handleSearch()" autocomplete="off">
        </div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const aiPanel = document.getElementById('aiPanel');
        const historyBar = document.getElementById('historyBar');
        let playHistory = [];

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; aiPanel.style.display = 'none'; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 20));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const isHeat = s.navn.toLowerCase().match(/remix|edit|2026/);
                const div = document.createElement('div');
                div.className = `song-item ${isHeat ? 'heat' : ''}`;
                div.innerHTML = `<div class="title">${s.navn}</div><div class="path">${s.sti}</div>`;
                div.onclick = () => copyAction(s.sti, s.navn);
                resultsDiv.appendChild(div);
            });
        }

        function copyAction(path, name) {
            navigator.clipboard.writeText(path);
            
            // History
            if (!playHistory.includes(name)) {
                playHistory.unshift(name);
                if (playHistory.length > 5) playHistory.pop();
                historyBar.innerHTML = playHistory.map(h => `<div class="history-chip">🕒 ${h.substring(0,15)}</div>`).join('');
            }

            // Neural AI Warp
            aiPanel.style.display = 'block';
            const words = name.toLowerCase().split(' ').filter(w => w.length > 4);
            const recs = mineSange.filter(s => s.navn !== name && words.some(w => s.navn.toLowerCase().includes(w))).slice(0, 2);
            
            let html = '<div style="font-size:11px; color:var(--cyan); font-weight:900; margin-bottom:15px; letter-spacing:1px;">NEURAL PREDICTION:</div>';
            recs.forEach(r => html += `<div style="background:rgba(0, 242, 255, 0.05); padding:15px; border-radius:18px; margin-bottom:10px; font-size:14px; border:1px solid rgba(0,242,255,0.2);" onclick="event.stopPropagation(); quickS('${r.navn.replace(/'/g, "\\'")}')">⚡ ${r.navn}</div>`);
            
            aiContent.innerHTML = html;
            document.getElementById('stat').innerText = "BIOMETRIC COPIED";
            setTimeout(() => { document.getElementById('stat').innerText = "M-ELITE NEURAL ENGINE V3"; }, 1500);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function quickS(n) { searchInput.value = n; handleSearch(); }

        function triggerSOS() { 
            const sos = mineSange.filter(s => s.navn.toLowerCase().match(/remix|club|banger|drop/)).sort(() => 0.5 - Math.random()).slice(0, 15);
            renderResults(sos);
            searchInput.value = "";
            document.getElementById('stat').innerText = "PANIC MODE ACTIVE";
            aiPanel.style.display = 'none';
        }
    </script>
</body>
</html>
