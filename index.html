<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" href="Fire_m.HEIC">
    
    <title>MiksMusik</title>
    <style>
        :root {
            --primary: #FFD700;    /* Guld */
            --accent: #FF4500;     /* Flamme-orange */
            --bg: #000000;         
            --card: rgba(20, 20, 20, 0.9); /* Gennemsigtige kort */
            --text: #ffffff;
            --header-height: 140px; 
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg); 
            /* Fire-M som baggrund */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('Fire_m.HEIC');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            padding-bottom: calc(var(--header-height) + 20px);
            -webkit-font-smoothing: antialiased;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 25px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 0 0 20px 20px;
        }

        .header-logo {
            width: 130px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 25px var(--accent);
            margin-bottom: 15px;
        }

        h1 { 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            color: var(--text);
        }
        h1 span { color: var(--primary); text-shadow: 0 0 15px var(--accent); }

        #results { display: flex; flex-direction: column; gap: 15px; }

        .song-item { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px);
        }

        .title { 
            font-weight: 700; 
            display: block; 
            margin-bottom: 10px; 
            font-size: 18px; 
            color: var(--primary); 
        }

        .path { 
            color: #ddd; 
            font-size: 11px; 
            word-break: break-all; 
            background: rgba(0,0,0,0.6); 
            padding: 12px; 
            border-radius: 10px; 
            display: block;
            border: 1px solid #333;
        }

        .footer {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: var(--header-height);
            background: rgba(0, 0, 0, 0.95); 
            z-index: 100; 
            border-top: 2px solid var(--accent);
            padding: 20px; 
            box-sizing: border-box; 
            backdrop-filter: blur(25px);
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        #search { 
            width: 100%; 
            max-width: 500px;
            padding: 16px 25px; 
            border-radius: 50px; 
            border: 2px solid #444; 
            font-size: 18px;
            background: #111; 
            color: white; 
            outline: none;
        }
        #search:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        .stat-text { font-size: 11px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="Fire_m.HEIC" alt="MiksMusik Logo" class="header-logo">
        <h1>Miks<span>Musik</span></h1>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="stat-text" id="stat">Henter arkiv...</div>
        <input type="text" id="search" placeholder="Find min musik" onkeyup="handleSearch()">
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');

        if (typeof mineSange !== 'undefined') {
            document.getElementById('stat').innerText = mineSange.length.toLocaleString() + " sange fundet";
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            
            const queryWords = query.split(' ').filter(w => w.length > 0);
            const matches = mineSange.filter(s => {
                const navn = s.navn.toLowerCase();
                return queryWords.every(word => navn.includes(word));
            });

            renderResults(matches.slice(0, 50));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <span class="title" onclick="copyText('${s.sti.replace(/'/g, "\\'")}')">${s.navn}</span>
                    <span class="path">${s.sti}</span>
                `;
                resultsDiv.appendChild(div);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Stien er kopieret til din udklipsholder!");
        }
    </script>
</body>
</html>
