<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>MiksMusik BIF DONG</title>
    <style>
        :root {
            --bif-yellow: #FDE100; 
            --bif-blue: #00529E;   
            --bg: #000000;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('m_logo.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #ffffff; margin: 0; padding: 20px; padding-bottom: 220px;
        }

        .header { text-align: center; padding: 40px 0 20px; }
        .header-logo { width: 70px; filter: drop-shadow(0 0 15px var(--bif-blue)); }

        .logo-text {
            font-family: 'Bodoni Moda', serif; font-size: 32px; font-weight: 900;
            text-transform: uppercase; display: flex; justify-content: center; gap: 8px;
        }
        .logo-text .miks { color: var(--bif-yellow); font-style: italic; }
        .logo-text .musik { color: var(--bif-blue); }

        /* DEN STORE DONG KNAP */
        .dong-master-container {
            margin-bottom: 30px;
            text-align: center;
        }

        .big-dong-btn {
            background: linear-gradient(45deg, var(--bif-blue), #003d75);
            color: var(--bif-yellow);
            border: 4px solid var(--bif-yellow);
            padding: 30px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 900;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(253, 225, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .big-dong-btn:active {
            transform: scale(0.95);
            background: var(--bif-yellow);
            color: var(--bif-blue);
        }

        .big-dong-btn span { font-size: 14px; opacity: 0.8; font-weight: 400; }

        #results { display: flex; flex-direction: column; gap: 12px; }

        .song-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; 
            border: 1px solid rgba(253, 225, 0, 0.1); display: flex; align-items: center; gap: 15px;
        }

        .title { font-weight: 700; color: var(--bif-yellow); }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; }

        .footer {
            position: fixed; bottom: 30px; left: 15px; right: 15px;
            background: rgba(0, 82, 158, 0.95); padding: 15px; border-radius: 35px;
            border: 2px solid var(--bif-yellow); z-index: 1000;
        }
        #search { 
            width: 100%; padding: 15px; border-radius: 25px; border: none;
            background: #fff; color: #000; font-size: 18px; font-weight: 700; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="m_logo.PNG" class="header-logo">
        <h1 class="logo-text"><span class="miks">Miks</span><span class="musik">Musik</span></h1>
    </div>

    <div class="dong-master-container">
        <button class="big-dong-btn" onclick="playDong()">
            MÅÅÅÅÅL!
            <span>Hjerterne er gule - sjælen er blå</span>
        </button>
    </div>

    <div id="results"></div>

    <div class="footer">
        <input type="text" id="search" placeholder="SØG MUSIK..." onkeyup="handleSearch()" autocomplete="off">
    </div>

    <audio id="dongAudio" src="bif-dong.mp3" preload="auto"></audio>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const audio = document.getElementById('dongAudio');

        function playDong() {
            // Spiller lyden
            audio.currentTime = 0; // Start forfra hver gang
            audio.play().catch(e => alert("Husk at uploade bif-dong.mp3 til GitHub!"));
            
            // Kopierer også teksten til din computer hvis du bruger den
            navigator.clipboard.writeText("Hjerterne er gule - sjælen er blå");
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 20));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="song-info"><div class="title">${s.navn}</div><div class="path">${s.sti}</div></div>`;
                div.onclick = () => { navigator.clipboard.writeText(s.sti); alert("Kopieret!"); };
                resultsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
