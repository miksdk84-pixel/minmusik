<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE PRO COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ff9d00; 
            --bg: #000000; 
            --card-bg: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.85);
            --border: #1c1c1c;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            padding: 40px 20px 20px; 
            text-align: center;
        }
        .logo-text { 
            font-weight: 800; 
            font-size: 14px; 
            letter-spacing: 5px; 
            color: var(--gold); 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 157, 0, 0.3);
        }

        /* STICKY TOP SECTION */
        .sticky-top {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        /* SEARCH BOX */
        .search-container { padding: 15px 20px; }
        .search-wrapper {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        #search {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            text-align: center;
        }
        #search::placeholder { color: #444; }

        /* VIBE SELECTOR */
        .vibe-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 20px 15px;
            scrollbar-width: none;
        }
        .vibe-scroll::-webkit-scrollbar { display: none; }
        
        .vibe-pill {
            background: #000;
            border: 1px solid var(--border);
            color: #666;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vibe-pill.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 157, 0, 0.4);
        }

        /* TRACK LIST */
        #results { padding: 20px; }
        .track-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s;
        }
        .track-item:active {
            transform: scale(0.97);
            border-color: var(--gold);
        }
        .track-info { flex: 1; min-width: 0; }
        .track-name {
            font-weight: 700;
            font-size: 14px;
            color: #eee;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-meta {
            font-size: 9px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* COPY INDICATOR */
        .copy-btn {
            background: #151515;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
        }

        /* BOTTOM DOCK */
        .dock {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .dock-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 10px;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
        }
        .dock-item.active { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">M-Elite Command</div>
</header>

<div class="sticky-top">
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="SEARCH ARCHIVE..." onkeyup="filterTracks()" autocomplete="off">
        </div>
    </div>

    <div class="vibe-scroll">
        <div class="vibe-pill active" onclick="setVibe('', this)">All</div>
        <div class="vibe-pill" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="vibe-pill" onclick="setVibe('house', this)">💃 House</div>
        <div class="vibe-pill" onclick="setVibe('remix', this)">🔥 Remix</div>
        <div class="vibe-pill" onclick="setVibe('retro', this)">⏪ Retro</div>
    </div>
</div>

<div id="results">
    </div>

<div class="dock">
    <div class="dock-item active">Search</div>
    <div class="dock-item" onclick="alert('Setliste kommer snart')">History</div>
    <div class="dock-item" style="color: #ff3b3b;" onclick="panic()">Bangers</div>
</div>

<script src="musik_data.js"></script>
<script>
    let currentVibe = '';

    function setVibe(vibe, el) {
        document.querySelectorAll('.vibe-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentVibe = vibe;
        filterTracks();
    }

    function filterTracks() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        const resultsDiv = document.getElementById('results');
        
        const matches = mineSange.filter(s => {
            const content = (s.navn + s.sti).toLowerCase();
            return content.includes(query) && content.includes(currentVibe);
        });

        if (query.length < 2 && currentVibe === '') {
            resultsDiv.innerHTML = '<div style="text-align:center; color:#222; margin-top:100px; font-weight:800; font-size:10px; letter-spacing:2px;">READY TO MIX</div>';
            return;
        }

        resultsDiv.innerHTML = matches.slice(0, 40).map(s => `
            <div class="track-item" onclick="copy('${s.sti.replace(/'/g, "\\'")}')">
                <div class="track-info">
                    <div class="track-name">${s.navn}</div>
                    <div class="track-meta">${s.sti.split('/').slice(-2, -1)}</div>
                </div>
                <div class="copy-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${currentVibe ? '#ff9d00' : '#444'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            </div>
        `).join('');
    }

    function copy(path) {
        navigator.clipboard.writeText(path);
        const searchInput = document.getElementById('search');
        const original = searchInput.placeholder;
        searchInput.placeholder = "PATH COPIED";
        setTimeout(() => searchInput.placeholder = original, 800);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.vibe-pill')[3]);
    }

    filterTracks();
</script>

</body>
</html>
