<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="M_logo.png">
    
    <style>
        :root { 
            /* FARVETEMA UDTROKKET FRA DIT LOGO */
            --accent-gold: #ff9d00;    /* Guld/Orange fra M-et */
            --accent-deep-red: #350101; /* Dybe rødbrune fra logo baggrund */
            
            --bg-overlay: rgba(5, 5, 5, 0.9); /* Mørk dæmpning af baggrundsbillede for læsbarhed */
            --card: rgba(15, 15, 15, 0.6);   /* Halvgennemsigtige kasser */
            --border: rgba(255, 157, 0, 0.1);  /* Guld-kant */
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            
            /* HER SÆTTES BAGGRUNDSBILLEDET */
            background-image: url('M_logo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
        }

        /* MØRK DÆMPNING OVER BAGGRUNDEN FOR AT LÆSE TEKST */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay); z-index: -1;
        }

        /* COMPACT HEADER MED LOGO */
        header { 
            padding: 50px 20px 10px; flex-shrink: 0; 
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .header-logo { width: 22px; height: 22px; object-fit: contain; }
        .app-title { 
            font-weight: 800; font-size: 11px; letter-spacing: 2px; 
            color: var(--accent-gold); text-transform: uppercase; 
        }

        /* SEARCH AREA */
        .controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-wrap { 
            background: rgba(30, 30, 30, 0.8); border-radius: 8px; padding: 15px 15px; 
            display: flex; align-items: center; border: 1px solid transparent;
            transition: 0.3s;
        }
        .search-wrap:focus-within { 
            border-color: var(--accent-gold); 
            box-shadow: 0 0 15px rgba(255, 157, 0, 0.2);
        }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 15px; font-weight: 600; outline: none;
        }
        #search::placeholder { color: #888; font-style: italic; }

        /* TABS (PILLS) */
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: rgba(40, 40, 40, 0.8); color: #fff; padding: 8px 16px; 
            border-radius: 20px; font-size: 12px; font-weight: 600; 
            white-space: nowrap; border: none; transition: 0.2s;
        }
        .tab.active { background: var(--accent-gold); color: #000; }

        /* OPTIMIZED LIST LAYOUT */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 10px 15px 120px;
        }

        .track-item { 
            background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s ease;
        }
        .track-item:active { background: var(--accent-deep-red); }
        .track-item.copied { background: var(--accent-deep-red) !important; border-color: var(--accent-gold); }
        .track-item.copied .copy-btn svg { stroke: var(--accent-gold); }
        
        .t-info { flex: 1; min-width: 0; padding-right: 15px; }
        .t-name { 
            font-weight: 700; font-size: 14px; color: #fff; 
            margin-bottom: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .t-path { 
            font-size: 9px; color: #888; text-transform: uppercase; font-family: monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
        }

        .copy-btn {
            background: transparent; border: none; padding: 5px; cursor: pointer;
            flex-shrink: 0;
        }

        /* DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 60%, transparent);
            padding: 20px 20px 40px; display: flex; justify-content: center; 
        }
        .panic-btn { 
            background: var(--accent-gold); color: #000; border: none;
            padding: 14px 35px; border-radius: 30px; font-weight: 800;
            font-size: 12px; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(255, 157, 0, 0.4);
        }

        .status { text-align: center; color: #333; padding: 40px; font-size: 10px; font-weight: 800; letter-spacing: 3px; }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" alt="Logo" class="header-logo">
    <div class="app-title">MiksMusik Control</div>
</header>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="filter()" autocomplete="off">
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Bibliotek</div>
        <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">House</div>
        <div class="tab" onclick="setVibe('remix', this)">Remix</div>
    </div>
</div>

<div id="results">
    <div class="status" id="status">SYNKRONISERER...</div>
</div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // Vi beholder din recovery-logik
    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            document.getElementById('status').innerHTML = "MIKSMUSIK ONLINE // " + db.length + " TRACKS";
            filter();
        } catch (e) {
            document.getElementById('status').innerHTML = "DATABASE OFFLINE";
        }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status">KLAR TIL NÆSTE TRACK</div>';
            return;
        }

        const matches = db.filter(s => {
            const txt = ((s.navn || '') + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });

        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track-item">
                <div class="t-info">
                    <div class="t-name">${s.navn || 'Ukendt'}</div>
                    <div class="t-path">${s.sti || ''}</div>
                </div>
                <button class="copy-btn" onclick="copy(this.parentElement, '${(s.sti || '').replace(/'/g, "\\'")}')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
        `).join('');
    }

    function copy(el, p) {
        navigator.clipboard.writeText(p);
        el.classList.add('copied');
        
        const search = document.getElementById('search');
        const original = search.placeholder;
        search.placeholder = "STI KOPIERET!";
        
        setTimeout(() => { 
            el.classList.remove('copied');
            search.placeholder = original;
        }, 800);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
