<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE PRO COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ff9d00; --bg: #000; --card: #0a0a0a; --border: #1c1c1c; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        header { padding: 40px 20px 20px; text-align: center; }
        .logo { font-weight: 800; font-size: 12px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }

        .sticky-top { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .search-wrapper { padding: 15px 20px; }
        #search { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; width: 100%; font-size: 16px; font-weight: 600; outline: none; text-align: center; box-sizing: border-box; }

        .vibe-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
        .vibe-scroll::-webkit-scrollbar { display: none; }
        .vibe-pill { background: #000; border: 1px solid var(--border); color: #444; padding: 8px 16px; border-radius: 100px; font-size: 10px; font-weight: 800; white-space: nowrap; text-transform: uppercase; }
        .vibe-pill.active { background: var(--gold); color: #000; border-color: var(--gold); }

        #results { padding: 20px; }
        .track { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .track-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { font-size: 9px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

<header><div class="logo">M-Elite Command</div></header>

<div class="sticky-top">
    <div class="search-wrapper">
        <input type="text" id="search" placeholder="SØG I ARKIV..." onkeyup="filter()" autocomplete="off">
    </div>
    <div class="vibe-scroll">
        <div class="vibe-pill active" onclick="setVibe('', this)">Alt</div>
        <div class="vibe-pill" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="vibe-pill" onclick="setVibe('house', this)">💃 House</div>
        <div class="vibe-pill" onclick="setVibe('remix', this)">🔥 Remix</div>
    </div>
</div>

<div id="results">
    <div style="text-align:center; color:#222; margin-top:50px; font-size:10px; letter-spacing:2px;">INDLÆSER ARKIV...</div>
</div>

<script src="musik_data.js"></script>

<script>
    let currentVibe = '';

    // TJEK DATA VED OPSTART
    window.onload = function() {
        if (typeof mineSange === 'undefined') {
            document.getElementById('results').innerHTML = '<div style="color:red; text-align:center; padding:20px;">FEJL: Kan ikke finde "mineSange" i musik_data.js</div>';
        } else {
            filter();
        }
    };

    function setVibe(vibe, el) {
        document.querySelectorAll('.vibe-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentVibe = vibe;
        filter();
    }

    function filter() {
        const query = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        // Find de sange der matcher
        const matches = mineSange.filter(s => {
            const txt = (s.navn + s.sti).toLowerCase();
            return txt.includes(query) && txt.includes(currentVibe);
        });

        if (query.length < 2 && currentVibe === '') {
            res.innerHTML = '<div style="text-align:center; color:#222; margin-top:50px; font-weight:800; font-size:10px;">READY TO MIX</div>';
            return;
        }

        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track" onclick="copy('${s.sti.replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0;">
                    <div class="track-name">${s.navn}</div>
                    <div class="track-meta">${s.sti}</div>
                </div>
            </div>
        `).join('');
    }

    function copy(path) {
        navigator.clipboard.writeText(path);
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "KOPIERET!";
        s.value = "";
        setTimeout(() => s.placeholder = old, 1000);
    }
</script>

</body>
</html>
