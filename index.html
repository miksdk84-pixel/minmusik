<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,400&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <title>MiksMusik Elite</title>
    <style>
        :root { 
            --gold: #c5a059; 
            --platinum: #ffffff; 
            --bg: #000000; 
            /* Mørkere glas for bedre læsbarhed */
            --glass: rgba(10, 10, 10, 0.85); 
            --glass-border: rgba(197, 160, 89, 0.2);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            /* Vi gør baggrunds-logoet lidt mørkere her (0.85 -> 0.92) */
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 50%), 
                              linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                              url('m_logo.PNG');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: var(--platinum); 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 220px; 
            -webkit-font-smoothing: antialiased;
        }

        .spotlight { 
            position: fixed; top: 0; left: 0; width: 100%; height: 350px; 
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1) 0%, transparent 70%); 
            pointer-events: none; z-index: 10; 
        }

        .header { text-align: center; padding: 40px 0 30px; position: relative; z-index: 20; }
        .header-logo { width: 85px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.9)); margin-bottom: 15px; }
        
        .logo-text { 
            font-family: 'Bodoni Moda', serif; font-size: 38px; font-weight: 900; 
            text-transform: uppercase; display: flex; justify-content: center; gap: 10px; 
        }
        .logo-text .miks { color: var(--platinum); font-style: italic; font-weight: 400; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .logo-text .musik { 
            color: var(--gold); 
            background: linear-gradient(to bottom, #f1d39b, #96702d); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        #results { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 20; }

        /* FORBEDRET LÆSBARHED PÅ KORTENE */
        .song-item { 
            background: var(--glass); 
            padding: 18px; 
            border-radius: 22px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            display: flex; 
            align-items: center; 
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .cover-art { 
            width: 55px; height: 55px; border-radius: 12px; object-fit: cover; 
            flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); 
        }

        .song-info { flex: 1; min-width: 0; }
        .title { 
            font-weight: 800; font-size: 17px; color: var(--platinum); 
            margin-bottom: 4px; text-shadow: 0 1px 3px rgba(0,0,0,1); 
        }
        .path { 
            color: #aaaaaa; font-size: 10px; font-family: monospace; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .footer { 
            position: fixed; bottom: 30px; left: 20px; right: 20px; 
            background: rgba(5, 5, 5, 0.95); 
            padding: 15px; border-radius: 35px; 
            backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000; box-shadow: 0 -10px 50px rgba(0,0,0,0.9); 
        }
        #search { 
            width: 100%; padding: 18px; border-radius: 25px; border: none; 
            background: rgba(255,255,255,0.08); color: white; font-size: 18px; 
            text-align: center; outline: none; 
        }
        .stat-text { text-align: center; font-size: 10px; color: var(--gold); margin-bottom: 8px; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="spotlight"></div>
    <div class="header">
        <img src="m_logo.PNG" class="header-logo">
        <h1 class="logo-text"><span class="miks">Miks</span><span class="musik">Musik</span></h1>
    </div>
    <div id="results"></div>
    <div class="footer">
        <div class="stat-text" id="stat">SYSTEM READY</div>
        <input type="text" id="search" placeholder="SØG HER..." onkeyup="handleSearch()" autocomplete="off">
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const statText = document.getElementById('stat');

        if (typeof mineSange !== 'undefined') {
            statText.innerText = mineSange.length.toLocaleString() + " TRACKS ANALYZED";
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const queryWords = query.split(" ");
            const matches = mineSange.filter(s => {
                const sangeNavn = s.navn.toLowerCase();
                return queryWords.every(word => sangeNavn.includes(word));
            });
            renderResults(matches.slice(0, 35));
        }

        async function fetchCover(songName, imgElement) {
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(songName)}&entity=song&limit=1`);
                const data = await res.json();
                if (data.results[0]) imgElement.src = data.results[0].artworkUrl100.replace('100x100', '300x300');
            } catch (e) { imgElement.src = 'm_logo.PNG'; }
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                const imgId = 'img-' + Math.random().toString(36).substr(2, 5);
                div.innerHTML = `
                    <img src="m_logo.PNG" class="cover-art" id="${imgId}">
                    <div class="song-info">
                        <div class="title">${s.navn}</div>
                        <div class="path">${s.sti}</div>
                        <div style="display:flex; gap:8px; margin-top:10px;">
                            <button onclick="copyText('${s.sti.replace(/'/g, "\\'")}')" style="background:rgba(197,160,89,0.2); color:var(--gold); border:1px solid var(--gold); padding:10px; border-radius:12px; font-size:10px; font-weight:800; flex:1;">KOPIÉR</button>
                            <button onclick="showFolder('${s.sti.substring(0, s.sti.lastIndexOf('/')).replace(/'/g, "\\'")}')" style="background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.2); padding:10px; border-radius:12px; font-size:10px; font-weight:800; flex:1;">MAPPE</button>
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(div);
                fetchCover(s.navn, document.getElementById(imgId));
            });
        }
        function showFolder(path) { searchInput.value = path; handleSearch(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function copyText(text) { navigator.clipboard.writeText(text); alert("Klar til pulten!"); }
    </script>
</body>
</html>
