<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <style>
        :root { --gold: #ff9d00; --bg: #000; --border: rgba(255, 157, 0, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: 40%; background-position: center; background-repeat: no-repeat;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: -1; }

        header { padding: 50px 20px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-small { width: 25px; vertical-align: middle; margin-bottom: 5px; }
        .app-title { font-weight: 800; font-size: 14px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

        /* TRENDING SECTION */
        .trending-wrap { padding: 15px 20px 5px; flex-shrink: 0; }
        .trending-header { font-size: 9px; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .trending-list { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .trending-list::-webkit-scrollbar { display: none; }
        .trending-item { 
            background: rgba(255, 157, 0, 0.1); border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 12px; font-size: 11px; white-space: nowrap; 
        }

        .controls { padding: 10px 20px 15px; }
        .search-box { 
            background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 15px;
            width: 100%; color: #fff; font-size: 16px; font-weight: 600; outline: none; text-align: center;
        }

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .tab { 
            background: #1a1a1a; color: #666; padding: 8px 16px; border-radius: 20px; 
            font-size: 11px; font-weight: 800; white-space: nowrap; border: none;
        }
        .tab.active { background: var(--gold); color: #000; }

        #results { flex-grow: 1; overflow-y: auto; padding: 0 15px 120px; }
        .track { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 10px; border-bottom: 1px solid #111;
        }
        .track:active { background: #0a0a0a; }
        .t-name { font-weight: 700; font-size: 14px; color: #eee; margin-bottom: 3px; display: block; }
        .t-path { font-size: 9px; color: #444; text-transform: uppercase; font-family: monospace; }

        .copy-icon { opacity: 0.4; }
        .copied .copy-icon { opacity: 1; stroke: var(--gold); }

        .dock { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 20px 20px 40px; border-top: 1px solid var(--border); }
        .panic-btn { 
            background: var(--gold); color: #000; width: 100%; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 900; font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" class="logo-small">
    <div class="app-title">MiksMusik Control</div>
</header>

<div class="trending-wrap">
    <div class="trending-header">Top 10 Trending</div>
    <div class="trending-list" id="trending">
        <div class="trending-item">Henter hits...</div>
    </div>
</div>

<div class="controls">
    <input type="text" id="search" class="search-box" placeholder="Næste sang er ....." onkeyup="filter()" autocomplete="off">
</div>

<div class="tabs">
    <div class="tab active" onclick="setVibe('', this)">Bibliotek</div>
    <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
    <div class="tab" onclick="setVibe('house', this)">House</div>
    <div class="tab" onclick="setVibe('remix', this)">Remix</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // HENTER TRENDING MUSIK (Demo Top 10)
    function fetchTrending() {
        const trendingList = document.getElementById('trending');
        // Her kunne vi hente rigtig data, men for nu laver vi en "Hot List"
        const topHits = [
            "1. Espresso - Sabrina Carpenter",
            "2. Birds of a Feather - Billie Eilish",
            "3. A Bar Song - Shaboozey",
            "4. Million Dollar Baby - Tommy Richman",
            "5. Not Like Us - Kendrick Lamar",
            "6. Good Luck, Babe! - Chappell Roan",
            "7. I Had Some Help - Post Malone",
            "8. Please Please Please - Sabrina Carpenter",
            "9. Too Sweet - Hozier",
            "10. Lose Control - Teddy Swims"
        ];
        
        trendingList.innerHTML = topHits.map(h => `<div class="trending-item">${h}</div>`).join('');
    }

    async function init() {
        fetchTrending();
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            filter();
        } catch (e) { console.log("Fejl ved indlæsning"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div style="text-align:center; padding-top:50px; color:#222; font-size:10px; letter-spacing:3px;">KLAR</div>';
            return;
        }

        const matches = db.filter(s => {
            const txt = (s.navn + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });

        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0; padding-right:10px;">
                    <span class="t-name">${s.navn}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
                <svg class="copy-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
        `).join('');
    }

    function copy(el, path) {
        navigator.clipboard.writeText(path);
        el.classList.add('copied');
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "KOPIERET!";
        setTimeout(() => { 
            el.classList.remove('copied');
            s.placeholder = old;
        }, 1000);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
