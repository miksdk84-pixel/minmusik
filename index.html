<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="fire_m.png">
    <title>MiksMusik PRO</title>
    <style>
        :root {
            --primary: #FFD700;
            --accent: #FF4500;
            --bg: #000000;         
            --card: rgba(25, 25, 25, 0.8); 
            --text: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('fire_m.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            padding-bottom: 180px;
            -webkit-font-smoothing: antialiased;
        }

        .header { text-align: center; padding: 30px 0 10px 0; }
        .header-logo { width: 100px; border-radius: 25px; box-shadow: 0 0 20px var(--accent); margin-bottom: 10px; }
        h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; color: #fff; text-shadow: 0 0 15px rgba(255,215,0,0.4); }

        #results { display: flex; flex-direction: column; gap: 12px; }

        .song-item { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .song-item:active { transform: scale(0.97); background: rgba(255, 215, 0, 0.2); }

        /* ALBUM COVER STIL */
        .cover-art {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: #222;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            flex-shrink: 0;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .song-info { flex-grow: 1; min-width: 0; }
        .title { font-weight: 800; display: block; font-size: 17px; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .path { color: rgba(255,255,255,0.4); font-size: 10px; word-break: break-all; display: block; margin-top: 4px; font-family: 'SF Mono', monospace; }

        /* TOAST / FEEDBACK */
        .toast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--primary); color: #000; padding: 6px 12px; border-radius: 15px;
            font-weight: 900; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .show-toast { opacity: 1; transform: translate(-50%, -100%); }

        /* FOOTER & SØGNING */
        .footer {
            position: fixed; bottom: 30px; left: 15px; right: 15px;
            background: rgba(15, 15, 15, 0.9); z-index: 1000; border: 1.5px solid rgba(255, 215, 0, 0.2);
            padding: 12px; border-radius: 40px; backdrop-filter: blur(40px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }

        #search { 
            width: 100%; padding: 16px; border-radius: 30px; border: none; font-size: 18px;
            background: rgba(255,255,255,0.07); color: white; outline: none; text-align: center; box-sizing: border-box;
        }

        .stat-text { text-align: center; font-size: 10px; color: var(--primary); margin-bottom: 8px; font-weight: 700; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="fire_m.png" alt="MiksMusik" class="header-logo">
        <h1>MiksMusik</h1>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="stat-text" id="stat">SYNKRONISERER...</div>
        <input type="text" id="search" placeholder="Find min musik" onkeyup="handleSearch()">
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');

        if (typeof mineSange !== 'undefined') {
            document.getElementById('stat').innerText = mineSange.length.toLocaleString() + " TRACKS READY";
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const queryWords = query.split(' ').filter(w => w.length > 0);
            const matches = mineSange.filter(s => {
                const navn = s.navn.toLowerCase();
                return queryWords.every(word => navn.includes(word));
            });
            renderResults(matches.slice(0, 30));
        }

        async function fetchCover(songName, imgElement) {
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(songName)}&entity=song&limit=1`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    imgElement.src = data.results[0].artworkUrl100.replace('100x100bb', '200x200bb');
                }
            } catch (e) { console.log("Cover ikke fundet"); }
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                
                // Unikt ID til cover-billedet
                const imgId = 'img-' + Math.random().toString(36).substr(2, 9);
                
                div.onclick = function() {
                    navigator.clipboard.writeText(s.sti);
                    const t = div.querySelector('.toast');
                    t.classList.add('show-toast');
                    setTimeout(() => t.classList.remove('show-toast'), 800);
                };

                div.innerHTML = `
                    <img src="fire_m.png" class="cover-art" id="${imgId}">
                    <div class="song-info">
                        <span class="title">${s.navn}</span>
                        <span class="path">${s.sti}</span>
                    </div>
                    <div class="toast">KOPIERET!</div>
                `;
                resultsDiv.appendChild(div);
                
                // Hent coveret i baggrunden
                fetchCover(s.navn, document.getElementById(imgId));
            });
        }
    </script>
</body>
</html>
