<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-SANDBOX</title>
    <style>
        :root { 
            --amber: #ff9d00; 
            --bg: #000000; 
            --card: #111111; 
            --red: #ff3b3b; 
            --green: #00ff88; 
            --gray: #222222;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .m-logo { width: 60px; filter: drop-shadow(0 0 15px var(--amber)); }

        /* SANDBOX CORE */
        .sandbox-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 25px;
            border: 1px solid var(--gray);
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .sandbox-title {
            font-size: 10px;
            font-weight: 900;
            color: var(--amber);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #reqInput {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            font-weight: 600;
        }

        #reqInput:focus { border-color: var(--amber); }

        .add-btn {
            background: var(--amber);
            border: none;
            border-radius: 15px;
            padding: 0 20px;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
        }

        /* LISTE ITEMS */
        .request-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .request-item {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
            border: 1px solid transparent;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .request-info { display: flex; align-items: center; gap: 12px; }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .owned { border-color: rgba(0, 255, 136, 0.2); }
        .missing { border-color: rgba(255, 59, 59, 0.2); }

        .track-name { font-weight: 700; font-size: 14px; }
        .remove-btn { color: #555; font-size: 18px; padding-left: 10px; cursor: pointer; }

        .empty-msg {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="m_logo.PNG" class="m-logo">
    </div>

    <div class="sandbox-container">
        <div class="sandbox-title">M-Elite Request Sandbox</div>
        
        <div class="input-group">
            <input type="text" id="reqInput" placeholder="Skriv ønske her..." onkeypress="handleKey(event)">
            <button class="add-btn" onclick="addRequest()">+</button>
        </div>

        <div id="reqList" class="request-list"></div>
        <div id="emptyMsg" class="empty-msg">Ingen ønsker i listen endnu</div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        let requests = [];

        function handleKey(e) {
            if (e.key === 'Enter') addRequest();
        }

        function addRequest() {
            const input = document.getElementById('reqInput');
            const val = input.value.trim();
            
            if (!val) return;

            // Tjekker om sangen findes i din musik_data.js
            const hasIt = mineSange.some(s => 
                s.navn.toLowerCase().includes(val.toLowerCase())
            );

            requests.unshift({
                id: Date.now(),
                name: val,
                owned: hasIt
            });

            input.value = '';
            renderRequests();
        }

        function removeRequest(id) {
            requests = requests.filter(r => r.id !== id);
            renderRequests();
        }

        function renderRequests() {
            const list = document.getElementById('reqList');
            const emptyMsg = document.getElementById('emptyMsg');
            
            if (requests.length === 0) {
                emptyMsg.style.display = 'block';
                list.innerHTML = '';
                return;
            }

            emptyMsg.style.display = 'none';
            list.innerHTML = requests.map(r => `
                <div class="request-item ${r.owned ? 'owned' : 'missing'}">
                    <div class="request-info">
                        <div class="status-dot" style="background: ${r.owned ? 'var(--green)' : 'var(--red)'}; box-shadow: 0 0 10px ${r.owned ? 'rgba(0,255,136,0.3)' : 'rgba(255,59,59,0.3)'}"></div>
                        <div class="track-name">${r.name}</div>
                    </div>
                    <div class="remove-btn" onclick="removeRequest(${r.id})">✕</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
