<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik AI ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --gold: #ff9d00;
            --deep: #1a0a00;
            --glass: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 157, 0, 0.2);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; color: #fff; margin: 0; height: 100vh; overflow: hidden;
            background-image: url('M_logo.png'); background-size: cover; background-position: center;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.85) 0%, #000 100%);
            z-index: -1;
        }

        header { 
            padding: 50px 20px 10px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-logo { width: 30px; height: 30px; filter: drop-shadow(0 0 10px var(--gold)); }
        .ai-badge { font-size: 8px; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; }

        .controls { padding: 15px 20px; }
        .search-container {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-container:focus-within { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 0 30px rgba(255,157,0,0.15); }
        #search { background: transparent; border: none; color: #fff; width: 100%; font-size: 18px; font-weight: 600; outline: none; }

        .vibe-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .vibe-pill { 
            background: rgba(255,255,255,0.05); color: #666; padding: 10px 20px; 
            border-radius: 100px; font-size: 11px; font-weight: 800; border: 1px solid transparent; transition: 0.3s;
        }
        .vibe-pill.active { background: rgba(255,157,0,0.1); color: var(--gold); border-color: var(--gold); }

        #results { flex-grow: 1; overflow-y: auto; padding: 10px 20px 150px; }

        .track-card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 14px;
            padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
            animation: aiAppear 0.4s ease-out;
        }
        @keyframes aiAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .track-card.popular { border-left: 4px solid var(--gold); }
        .t-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; display: block; }
        .t-path { font-size: 9px; color: #444; font-family: monospace; text-transform: uppercase; }

        .ai-copy-btn { 
            background: rgba(255,157,0,0.05); border: 1px solid var(--border); 
            width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }

        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, #000 80%, transparent);
            padding: 20px 20px 50px; display: flex; justify-content: center;
        }
        .panic-btn { 
            background: var(--gold); color: #000; padding: 18px 45px; 
            border-radius: 100px; font-weight: 900; font-size: 13px; letter-spacing: 2px;
            box-shadow: 0 15px 35px rgba(255, 157, 0, 0.4);
        }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" class="header-logo">
    <div style="text-align: center;">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">MIKSMUSIK</div>
        <div style="font-weight: 800; font-size: 14px; color: var(--gold);">ELITE AI</div>
    </div>
    <div class="ai-badge">V2.0</div>
</header>

<div class="controls">
    <div class="search-container">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="aiSearch()" autocomplete="off">
    </div>
</div>

<div class="vibe-bar">
    <div class="vibe-pill active" onclick="setVibe('', this)">ALL ASSETS</div>
    <div class="vibe-pill" onclick="setVibe('dansk', this)">🇩🇰 DANISH</div>
    <div class="vibe-pill" onclick="setVibe('house', this)">💃 HOUSE</div>
    <div class="vibe-pill" onclick="setVibe('remix', this)">🔥 REMIXES</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';
    let aiEngine;
    let popularTracks = JSON.parse(localStorage.getItem('ai_history') || '{}');

    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            
            aiEngine = new Fuse(db, {
                keys: [{name: 'navn', weight: 0.7}, {name: 'sti', weight: 0.3}],
                threshold: 0.3,
                includeScore: true
            });

            aiSearch();
        } catch (e) { console.error("AI Load Error"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.vibe-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        aiSearch();
    }

    function aiSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div style="text-align:center; padding-top:100px; opacity:0.2; font-weight:900; font-size:12px; letter-spacing:5px;">AI ENGINE STANDBY</div>';
            return;
        }

        let results = q.length >= 2 ? aiEngine.search(q).map(r => r.item) : db;

        if (vibe) {
            results = results.filter(s => (s.navn + s.sti).toLowerCase().includes(vibe));
        }

        // AI SORTING: Ryk populære sange op
        results.sort((a, b) => (popularTracks[b.navn] || 0) - (popularTracks[a.navn] || 0));

        res.innerHTML = results.slice(0, 40).map(s => `
            <div class="track-card ${popularTracks[s.navn] ? 'popular' : ''}">
                <div style="flex:1; min-width:0;">
                    <span class="t-name">${s.navn}</span>
                    <span class="t-path">${s.sti}</span>
                </div>
                <div class="ai-copy-btn" onclick="aiCopy(this, '${s.navn}', '${(s.sti || '').replace(/'/g, "\\'")}')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            </div>
        `).join('');
    }

    function aiCopy(btn, name, path) {
        navigator.clipboard.writeText(path);
        
        // Gem til AI History
        popularTracks[name] = (popularTracks[name] || 0) + 1;
        localStorage.setItem('ai_history', JSON.stringify(popularTracks));

        const search = document.getElementById('search');
        search.placeholder = "AI: " + name + " COPIED";
        btn.style.color = "var(--gold)";
        
        setTimeout(() => { 
            search.placeholder = "Næste sang er .....";
            btn.style.color = "white";
        }, 1500);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.vibe-pill')[3]);
    }

    init();
</script>

</body>
</html>
