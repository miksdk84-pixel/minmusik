<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik NEURAL AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --gold: #ff9d00;
            --deep: #1a0a00;
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 157, 0, 0.2);
            --neural-glow: rgba(255, 157, 0, 0.15);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; color: #fff; margin: 0; height: 100vh; overflow: hidden;
            background-image: url('M_logo.png'); background-size: cover; background-position: center;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.85) 0%, #000 100%);
            z-index: -1;
        }

        /* NEURAL HEADER */
        header { 
            padding: 55px 25px 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
        }
        .header-logo { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--gold)); }
        .ai-status { font-size: 8px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }

        .controls { padding: 20px; }
        .search-container {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; backdrop-filter: blur(25px); position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 18px; font-weight: 600; outline: none; text-align: center;
        }
        #search::placeholder { color: #444; }

        /* DYNAMISKE AI TABS */
        .vibe-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .vibe-pill { 
            background: rgba(255,255,255,0.03); color: #555; padding: 12px 22px; 
            border-radius: 100px; font-size: 11px; font-weight: 800; border: 1px solid transparent; transition: 0.4s;
        }
        .vibe-pill.active { background: rgba(255,157,0,0.1); color: var(--gold); border-color: var(--gold); box-shadow: 0 0 15px var(--neural-glow); }

        /* NEURAL GRID RESULTS */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 15px 20px 150px;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .ai-card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; justify-content: flex-end;
            aspect-ratio: 1/1; position: relative; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden; backdrop-filter: blur(10px);
        }
        .ai-card:active { transform: scale(0.92); background: rgba(255,157,0,0.1); }
        
        .ai-card.top-match { border-color: var(--gold); box-shadow: 0 0 20px var(--neural-glow); }
        .ai-card.top-match::after {
            content: "AI MATCH"; position: absolute; top: 12px; right: 12px;
            font-size: 7px; font-weight: 900; color: var(--gold);
        }

        .t-name { font-weight: 800; font-size: 13px; margin-bottom: 5px; line-height: 1.3; z-index: 2; }
        .t-path { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1px; z-index: 2; }

        /* FLOATING DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, #000 85%, transparent);
            padding: 20px 25px 50px; display: flex; justify-content: center;
        }
        .panic-btn { 
            background: var(--gold); color: #000; padding: 18px 50px; 
            border-radius: 100px; font-weight: 900; font-size: 13px; letter-spacing: 3px;
            box-shadow: 0 15px 40px rgba(255, 157, 0, 0.4); border: none;
        }

        .status-info { text-align: center; color: #111; grid-column: span 2; padding: 50px; font-weight: 900; font-size: 10px; letter-spacing: 6px; }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" class="header-logo">
    <div class="ai-status" id="ai-brain">NEURAL ENGINE ACTIVE</div>
    <div id="clock" style="font-size: 10px; font-weight: 800; opacity: 0.5;">00:00</div>
</header>

<div class="controls">
    <div class="search-container">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="neuralSearch()" autocomplete="off">
    </div>
</div>

<div class="vibe-scroll" id="vibe-bar">
    <div class="vibe-pill active" onclick="setVibe('', this)">ALL ASSETS</div>
    <div class="vibe-pill" onclick="setVibe('dansk', this)">🇩🇰 DANISH</div>
    <div class="vibe-pill" onclick="setVibe('house', this)">💃 HOUSE</div>
    <div class="vibe-pill" onclick="setVibe('remix', this)">🔥 REMIXES</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';
    let engine;
    let history = JSON.parse(localStorage.getItem('ai_rank') || '{}');

    // AI TIME CONTEXT
    function updateContext() {
        const hour = new Date().getHours();
        const clock = document.getElementById('clock');
        clock.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Foreslår vibe baseret på tid
        if (hour >= 22 || hour <= 4) {
            document.getElementById('ai-brain').innerText = "AI CONTEXT: PEAK NIGHT";
        }
    }

    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            
            engine = new Fuse(db, {
                keys: [{name: 'navn', weight: 0.8}, {name: 'sti', weight: 0.2}],
                threshold: 0.3,
                includeScore: true
            });

            neuralSearch();
            setInterval(updateContext, 10000);
            updateContext();
        } catch (e) { console.error("Neural Error"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.vibe-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        neuralSearch();
    }

    function neuralSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status-info">NEURAL ENGINE STANDBY</div>';
            return;
        }

        let matches = q.length >= 2 ? engine.search(q) : db.map(s => ({item: s, score: 1}));

        if (vibe) {
            matches = matches.filter(m => (m.item.navn + m.item.sti).toLowerCase().includes(vibe));
        }

        // NEURAL RANKING (History + Score)
        matches.sort((a, b) => {
            const rankA = (history[a.item.navn] || 0) * 0.5;
            const rankB = (history[b.item.navn] || 0) * 0.5;
            return (a.score - rankA) - (b.score - rankB);
        });

        res.innerHTML = matches.slice(0, 30).map((m, index) => `
            <div class="ai-card ${index === 0 && q.length > 2 ? 'top-match' : ''}" 
                 onclick="neuralCopy(this, '${m.item.navn}', '${(m.item.sti || '').replace(/'/g, "\\'")}')">
                <span class="t-name">${m.item.navn}</span>
                <span class="t-path">${m.item.sti.split('/').pop()}</span>
            </div>
        `).join('');
    }

    function neuralCopy(el, name, path) {
        navigator.clipboard.writeText(path);
        
        history[name] = (history[name] || 0) + 1;
        localStorage.setItem('ai_rank', JSON.stringify(history));

        const search = document.getElementById('search');
        search.placeholder = "NEURAL: " + name + " COPIED";
        
        setTimeout(() => { 
            search.placeholder = "Næste sang er .....";
        }, 1500);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.vibe-pill')[3]);
    }

    init();
</script>

</body>
</html>
