<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-QUICK SANDBOX</title>
    <style>
        :root { 
            --amber: #ff9d00; 
            --bg: #000000; 
            --card: #0c0c0c; 
            --red: #ff3b3b; 
            --green: #00ff88; 
            --gray: #222222;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* MINIMALISTISK LOGO */
        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .m-logo { width: 55px; filter: drop-shadow(0 0 10px var(--amber)); opacity: 0.8; }

        /* SANDBOX PANEL */
        .sandbox-panel {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--gray);
            padding: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }

        .panel-label {
            font-size: 9px;
            font-weight: 900;
            color: var(--amber);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-align: center;
            opacity: 0.6;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #reqInput {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            font-weight: 600;
            transition: border-color 0.2s;
        }

        #reqInput:focus { border-color: var(--amber); }

        .add-btn {
            background: var(--amber);
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            font-weight: 900;
            font-size: 18px;
            color: #000;
            cursor: pointer;
        }

        /* LISTE DESIGN */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1a1a;
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .info { display: flex; align-items: center; gap: 12px; flex: 1; }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .name { font-weight: 700; font-size: 14px; color: #eee; }
        
        .delete { 
            color: #444; 
            font-size: 16px; 
            padding: 5px 10px;
            cursor: pointer;
        }

        /* STATUS TEKST */
        .status-msg {
            margin-top: 15px;
            font-size: 10px;
            color: #333;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="m_logo.PNG" class="m-logo">
    </div>

    <div class="sandbox-panel">
        <div class="panel-label">Quick Validator</div>
        
        <div class="input-row">
            <input type="text" id="reqInput" placeholder="Ønske (f.eks. 'Avicii')" onkeypress="if(event.key==='Enter')addReq()">
            <button class="add-btn" onclick="addReq()">+</button>
        </div>

        <div id="list" class="list-container"></div>
        <div class="status-msg" id="statusMsg">Klar til ønsker</div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        let list = [];

        function addReq() {
            const input = document.getElementById('reqInput');
            const val = input.value.trim();
            if (!val) return;

            // Lyn-søgning i dit musik-bibliotek
            const match = mineSange.some(s => 
                s.navn.toLowerCase().includes(val.toLowerCase())
            );

            list.unshift({ id: Date.now(), name: val, has: match });
            input.value = '';
            render();
            
            // Visuel bekræftelse i bunden
            const msg = document.getElementById('statusMsg');
            msg.innerText = match ? "MATCH FUNDET ✅" : "IKKE I BIBLIOTEK ❌";
            msg.style.color = match ? "var(--green)" : "var(--red)";
            setTimeout(() => { msg.innerText = "Klar til ønsker"; msg.style.color = "#333"; }, 2000);
        }

        function remove(id) {
            list = list.filter(i => i.id !== id);
            render();
        }

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = list.map(i => `
                <div class="item" style="border-left: 3px solid ${i.has ? 'var(--green)' : 'var(--red)'}">
                    <div class="info">
                        <div class="dot" style="background: ${i.has ? 'var(--green)' : 'var(--red)'}; box-shadow: 0 0 8px ${i.has ? 'var(--green)' : 'var(--red)'}44"></div>
                        <div class="name">${i.name}</div>
                    </div>
                    <div class="delete" onclick="remove(${i.id})">✕</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
