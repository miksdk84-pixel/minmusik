<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,400&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    
    <title>MiksMusik Elite</title>
    <style>
        :root {
            --gold: #c5a059;       /* Champagne Guld */
            --platinum: #e5e5e5;   /* Platin Hvid */
            --bg: #050505;         /* Dyb Sort */
            --glass: rgba(255, 255, 255, 0.03);
            --header-height: 140px;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); 
            /* Baggrunden er fikseret så den ikke skubber indholdet væk */
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08) 0%, transparent 50%), url('m_logo.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--platinum); 
            margin: 0; 
            padding: 20px;
            padding-bottom: calc(var(--header-height) + 60px);
            -webkit-font-smoothing: antialiased;
        }

        /* LYSSPOT I TOPPEN */
        .spotlight {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 350px;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 10;
        }

        .header {
            text-align: center;
            padding: 40px 0 30px;
            position: relative;
            z-index: 20;
        }

        .header-logo {
            width: 85px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* ELEGANT LOGO TEKST */
        .logo-text {
            font-family: 'Bodoni Moda', serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .logo-text .miks {
            color: var(--platinum);
            font-style: italic;
            font-weight: 400;
        }

        .logo-text .musik {
            color: var(--gold);
            background: linear-gradient(to bottom, #f1d39b, #96702d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* SANG LISTE */
        #results { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            position: relative; 
            z-index: 20; 
        }

        .song-item { 
            background: var(--glass); 
            padding: 16px; 
            border-radius: 22px; 
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex; 
            align-items: center; 
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cover-art {
            width: 55px; height: 55px; border-radius: 12px;
            object-fit: cover; background: #111;
            border: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .song-info { flex: 1; min-width: 0; }
        .title { font-weight: 700; font-size: 16px; color: var(--platinum); margin-bottom: 4px; }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            background: rgba(255,255,255,0.03); color: var(--gold); border: 1px solid rgba(197,160,89,0.2);
            padding: 10px; border-radius: 10px; font-size: 10px; font-weight: 800; flex: 1; text-transform: uppercase;
        }

        /* FLOATING SEARCH BAR */
        .footer {
            position: fixed; 
            bottom: 30px; 
            left: 20px; 
            right: 20px;
            background: rgba(10, 10, 10, 0.85);
            padding: 15px; 
            border-radius: 35px;
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.8);
        }

        #search { 
            width: 100%; 
            padding: 18px; 
            border-radius: 25px; 
            border: none;
            background: rgba(255,255,255,0.05); 
            color: white; 
            font-size: 18px;
            text-align: center; 
            outline: none;
            box-sizing: border-box;
        }

        .stat-text { text-align: center; font-size: 10px; color: var(--gold); margin-bottom: 8px; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="spotlight"></div>

    <div class="header">
        <img src="m_logo.PNG" class="header-logo">
        <h1 class="logo-text">
            <span class="miks">Miks</span><span class="musik">Musik</span>
        </h1>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="stat-text" id="stat">ELITE SYSTEM READY</div>
        <input type="text" id="search" placeholder="FIND DIT TRACK..." onkeyup="handleSearch()" autocomplete="off" spellcheck="false">
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');

        if (typeof mineSange !== 'undefined') {
            document.getElementById('stat').innerText = mineSange.length.toLocaleString() + " TRACKS ANALYZED";
        }

            const query = searchInput.value.toLowerCase();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 30));
        }
