<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE COMMAND PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ff9d00; --bg: #000; --card: #0d0d0d; --border: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 50px 20px 10px; background: linear-gradient(to bottom, #0a0a0a, var(--bg)); text-align: center; flex-shrink: 0; }
        .app-title { font-weight: 800; font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; opacity: 0.6; }
        .controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-wrap { background: #151515; border: 1px solid var(--border); border-radius: 18px; padding: 16px 20px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #search { background: transparent; border: none; color: #fff; width: 100%; font-size: 17px; font-weight: 600; outline: none; text-align: center; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0 5px; scrollbar-width: none; }
        .tab { background: #111; border: 1px solid var(--border); color: #444; padding: 10px 22px; border-radius: 14px; font-size: 11px; font-weight: 800; white-space: nowrap; text-transform: uppercase; }
        .tab.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 157, 0, 0.2); }
        #results { flex-grow: 1; overflow-y: auto; padding: 0 20px 140px; -webkit-overflow-scrolling: touch; }
        .track { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .t-name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-path { font-size: 9px; color: #333; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; display: block; }
        .dock { position: fixed; bottom: 30px; left: 20px; right: 20px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(30px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.08); padding: 10px; display: flex; justify-content: space-around; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .dock-btn { border: none; background: transparent; color: #444; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .dock-btn.active { color: var(--gold); }
        .status-msg { text-align: center; margin-top: 100px; color: #151515; font-weight: 900; font-size: 12px; letter-spacing: 6px; }
    </style>
</head>
<body>

<header><div class="app-title">M-Elite Pro Command</div></header>

<div class="controls">
    <div class="search-wrap"><input type="text" id="search" placeholder="HENTER ARKIV..." onkeyup="filter()" autocomplete="off"></div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Alt</div>
        <div class="tab" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">💃 House</div>
        <div class="tab" onclick="setVibe('remix', this)">🔥 Remix</div>
    </div>
</div>

<div id="results"><div class="status-msg" id="status">FORBINDER TIL BACKUP...</div></div>

<div class="dock">
    <button class="dock-btn active">Søg</button>
    <button class="dock-btn" onclick="setVibe('2024', null)">Nyt</button>
    <button class="dock-btn" style="color:#ff3b3b" onclick="location.reload(true)">Reload</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // VI HENTER DIN BACKUP DIREKTE FRA GITHUB HISTORIKKEN
    async function recoverData() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            const text = await response.text();
            // Rens teksten så den kan læses som data
            const cleanData = JSON.parse(text.replace('const mineSange = ', '').replace(';', '').trim());
            db = cleanData;
            document.getElementById('status').innerHTML = "ARKIV GENOPRETTET (" + db.length + ")";
            document.getElementById('search').placeholder = "Søg i " + db.length + " sange...";
            filter();
        } catch (e) {
            document.getElementById('status').innerHTML = "FEJL VED GENOPRETTELSE";
        }
    }

    function setVibe(v, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status-msg">KLAR TIL MIX</div>';
            return;
        }
        const matches = db.filter(s => {
            const txt = ((s.navn || '') + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });
        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track" onclick="copyPath('${(s.sti || '').replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0; padding-right:10px;">
                    <span class="t-name">${s.navn || 'Ukendt'}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
                <div style="opacity:0.2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${vibe ? '#ff9d00' : '#fff'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            </div>
        `).join('');
    }

    function copyPath(p) {
        navigator.clipboard.writeText(p);
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "KOPIERET!";
        s.value = "";
        setTimeout(() => { s.placeholder = old; filter(); }, 800);
    }

    recoverData();
</script>

</body>
</html>
