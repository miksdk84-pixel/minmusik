<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik PRO OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <style>
        :root { 
            --gold: #ff9d00; 
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 157, 0, 0.15);
            --blur: blur(25px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: 50%; background-position: center; background-repeat: no-repeat;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: -1; }

        /* iPHONE STATUS BAR STYLE */
        .status-bar { padding: 55px 25px 10px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        .battery { width: 20px; height: 10px; border: 1px solid #444; border-radius: 3px; position: relative; }
        .battery::after { content: ""; position: absolute; top: 1.5px; left: 1.5px; width: 14px; height: 5px; background: var(--gold); border-radius: 1px; }

        /* SEARCH AREA - LIQUID GLASS */
        .controls { padding: 10px 20px 20px; }
        .search-container {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border); border-radius: 20px; padding: 18px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 17px; font-weight: 600; outline: none; text-align: center;
        }
        #search::placeholder { color: #444; font-style: normal; }

        /* CATEGORY GRID */
        .vibe-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 20px 20px; }
        .vibe-btn { 
            background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--border);
            height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .vibe-btn.active { background: var(--gold); border-color: var(--gold); transform: scale(1.1); }

        /* RESULTS - MODERN TILES */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 0 20px 150px; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        .track-tile { 
            background: var(--glass); backdrop-filter: var(--blur); border: 1px solid var(--border);
            padding: 20px; border-radius: 22px; display: flex; flex-direction: column; justify-content: flex-end;
            aspect-ratio: 1/1; transition: 0.2s; position: relative;
        }
        .track-tile:active { transform: scale(0.95); background: rgba(255,157,0,0.1); }
        .track-tile.copied { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,157,0,0.2); }

        .t-name { font-weight: 800; font-size: 13px; line-height: 1.2; margin-bottom: 5px; }
        .t-path { font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* COPY ICON OVERLAY */
        .copy-hint { position: absolute; top: 15px; right: 15px; opacity: 0.1; transition: 0.3s; }
        .track-tile.copied .copy-hint { opacity: 1; color: var(--gold); }

        /* LIQUID DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, #000 80%, transparent);
            padding: 20px 25px 50px; display: flex; justify-content: center;
        }
        .panic-btn { 
            background: var(--gold); color: #000; padding: 18px; width: 100%;
            border-radius: 18px; font-weight: 900; font-size: 13px; letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(255, 157, 0, 0.4); border: none;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div id="time">00:00</div>
    <div style="display:flex; gap:8px; align-items:center;">
        <span style="font-size:10px;">5G</span>
        <div class="battery"></div>
    </div>
</div>

<div class="controls">
    <div class="search-container">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="filter()" autocomplete="off">
    </div>
</div>

<div class="vibe-grid">
    <div class="vibe-btn active" onclick="setVibe('', this)">🏠</div>
    <div class="vibe-btn" onclick="setVibe('dansk', this)">🇩🇰</div>
    <div class="vibe-btn" onclick="setVibe('house', this)">💃</div>
    <div class="vibe-btn" onclick="setVibe('remix', this)">🔥</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    function updateTime() {
        const now = new Date();
        document.getElementById('time').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000);
    updateTime();

    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            filter();
        } catch (e) { console.log("System Error"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div style="grid-column: span 2; text-align:center; padding-top:100px; opacity:0.1; font-weight:900; font-size:12px; letter-spacing:10px;">READY</div>';
            return;
        }

        const matches = db.filter(s => {
            const txt = (s.navn + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });

        res.innerHTML = matches.slice(0, 40).map(s => `
            <div class="track-tile" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div class="copy-hint">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
                <span class="t-name">${s.navn}</span>
                <span class="t-path">${s.sti.split('/').pop()}</span>
            </div>
        `).join('');
    }

    function copy(el, path) {
        navigator.clipboard.writeText(path);
        el.classList.add('copied');
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "TRACK COPIED!";
        setTimeout(() => { 
            el.classList.remove('copied');
            s.placeholder = old;
        }, 1200);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.vibe-btn')[3]);
    }

    init();
</script>

</body>
</html>
