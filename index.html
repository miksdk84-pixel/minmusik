<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,400&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE PREDICTIVE</title>
    <style>
        :root { --amber: #ff9d00; --plat: #ffffff; --bg: #000; --ai-blue: #00ffff; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 157, 0, 0.1) 0%, transparent 60%), url('m_logo.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--plat); margin: 0; padding: 20px; padding-bottom: 240px;
        }

        /* SMART HEADER */
        .header { text-align: center; padding: 40px 0 20px; }
        .mode-indicator { font-size: 9px; letter-spacing: 3px; color: var(--amber); text-transform: uppercase; margin-bottom: 10px; font-weight: 900; opacity: 0.8; }

        /* PREDICTIVE AI PANEL */
        #aiPanel { 
            background: linear-gradient(145deg, #0a0a0a, #151515); 
            border-left: 4px solid var(--ai-blue); border-radius: 15px; 
            padding: 18px; margin-bottom: 20px; display: none;
            box-shadow: 0 10px 30px rgba(0,255,255,0.05);
        }
        .ai-status { font-size: 10px; color: var(--ai-blue); font-weight: 900; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .ai-chip { background: rgba(0,255,255,0.05); padding: 12px; border-radius: 12px; font-size: 13px; border: 1px solid rgba(0,255,255,0.1); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }

        /* LIST DESIGN */
        #results { display: flex; flex-direction: column; gap: 15px; }
        .song-item { background: rgba(20,20,20,0.9); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,157,0,0.1); position: relative; overflow: hidden; }
        .song-item::after { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--amber); opacity: 0.5; }
        .title { font-weight: 900; font-size: 17px; color: var(--amber); margin-bottom: 5px; text-transform: uppercase; }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn { background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 900; width: 100%; margin-top: 12px; text-transform: uppercase; }

        /* PREDICTIVE FOOTER */
        .footer { position: fixed; bottom: 20px; left: 15px; right: 15px; z-index: 1000; }
        .foot-wrap { background: rgba(10, 10, 10, 0.98); padding: 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(30px); position: relative; }
        #search { width: 100%; padding: 15px; border-radius: 20px; border: none; background: rgba(255,255,255,0.08); color: #fff; font-size: 18px; text-align: center; outline: none; font-weight: 700; }
        
        .sos-btn { 
            position: absolute; right: 10px; top: -20px; width: 55px; height: 55px; 
            background: #ff3b3b; border-radius: 50%; border: 4px solid #000; color: white; 
            font-weight: 900; font-size: 10px; box-shadow: 0 0 20px rgba(255,59,59,0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="timeMode" class="mode-indicator">SYSTEM INITIALIZING...</div>
        <img src="m_logo.PNG" style="width: 80px; filter: drop-shadow(0 0 20px var(--amber));">
    </div>

    <div id="aiPanel">
        <div class="ai-status"><span id="aiLabel">PREDICTIVE ANALYSIS</span> <span id="aiConf">98% MATCH</span></div>
        <div id="aiContent"></div>
    </div>

    <div id="results"></div>

    <div class="footer">
        <button class="sos-btn" onclick="triggerSOS()">SOS</button>
        <div class="foot-wrap">
            <input type="text" id="search" placeholder="SEARCH OR COMMAND..." onkeyup="handleSearch()" autocomplete="off">
            <div id="stat" style="text-align: center; font-size: 9px; color: var(--amber); margin-top: 10px; font-weight: 800; letter-spacing: 1px;">M-ELITE AI V2.5 ONLINE</div>
        </div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const aiPanel = document.getElementById('aiPanel');
        const aiContent = document.getElementById('aiContent');

        // Peak Hour Logic
        function updateMode() {
            const hour = new Date().getHours();
            const modeText = document.getElementById('timeMode');
            if(hour >= 22 || hour <= 4) modeText.innerText = "⚡ PEAK HOUR MODE ACTIVE";
            else if(hour >= 18) modeText.innerText = "🍸 WARM-UP MODE ACTIVE";
            else modeText.innerText = "☕ LIBRARY MANAGEMENT MODE";
        }
        setInterval(updateMode, 60000); updateMode();

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; aiPanel.style.display = 'none'; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 20));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="title">${s.navn}</div><div class="path">${s.sti}</div><button class="btn" onclick="copyAction('${s.sti.replace(/'/g, "\\'")}', '${s.navn.replace(/'/g, "\\'")}')">SELECT TRACK</button>`;
                resultsDiv.appendChild(div);
            });
        }

        function copyAction(path, name) {
            navigator.clipboard.writeText(path);
            aiPanel.style.display = 'block';
            
            // Predictive Intelligence
            const words = name.toLowerCase().split(' ').filter(w => w.length > 3);
            const recs = mineSange.filter(s => s.navn !== name && words.some(w => s.navn.toLowerCase().includes(w))).slice(0, 2);
            
            let html = '';
            recs.forEach(r => html += `<div class="ai-chip" onclick="quickS('${r.navn.replace(/'/g, "\\'")}')"><span>NEXT TRACK:</span> <strong>${r.navn}</strong></div>`);
            
            // Missing Link Intelligence
            const tips = ["Check for 2026 Remix", "Instrumental missing", "Acapella available online"];
            html += `<div style="font-size:10px; color:var(--ai-blue); margin-top:10px; font-weight:800; border-top:1px solid rgba(0,255,255,0.1); padding-top:10px;">💡 AI CRATE-DIGGER: ${tips[Math.floor(Math.random()*tips.length)]}</div>`;
            
            aiContent.innerHTML = html;
            document.getElementById('stat').innerText = "TRACK LOADED - AI UPDATED";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function quickS(n) { searchInput.value = n; handleSearch(); }

        function triggerSOS() { 
            const hour = new Date().getHours();
            let filter = /remix|edit|club/;
            if (hour >= 22 || hour <= 4) filter = /banger|hype|drop|handsup/; // Peak hour SOS
            
            const sos = mineSange.filter(s => s.navn.toLowerCase().match(filter)).slice(0, 15);
            renderResults(sos);
            document.getElementById('stat').innerText = "PEAK HOUR SOS LOADED!";
        }
    </script>
</body>
</html>
