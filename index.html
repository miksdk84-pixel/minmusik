<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>MiksMusik BIF DONG</title>
    <style>
        :root {
            --bif-yellow: #FDE100; 
            --bif-blue: #00529E;   
            --bg: #000000;
            --glass: rgba(0, 40, 80, 0.9); 
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -10%, rgba(253, 225, 0, 0.3) 0%, transparent 50%), 
                              linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), 
                              url('m_logo.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            margin: 0; padding: 20px;
            padding-bottom: 220px;
            -webkit-font-smoothing: antialiased;
        }

        .spotlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 300px;
            background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none; z-index: 10;
        }

        .header { text-align: center; padding: 50px 0 20px; position: relative; z-index: 20; }
        .header-logo { width: 80px; filter: drop-shadow(0 0 20px var(--bif-blue)); margin-bottom: 10px; }

        .logo-text {
            font-family: 'Bodoni Moda', serif; font-size: 36px; font-weight: 900;
            text-transform: uppercase; display: flex; justify-content: center; gap: 10px;
        }
        .logo-text .miks { color: var(--bif-yellow); font-style: italic; }
        .logo-text .musik { color: var(--bif-blue); text-shadow: 0 0 10px rgba(0, 82, 158, 0.5); }

        #results { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 20; }

        /* DONG KORT - EKSTRA TYDELIGE */
        .song-item { 
            background: var(--glass); 
            padding: 20px; border-radius: 25px; 
            border: 2px solid var(--bif-yellow);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .cover-art { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; border: 1px solid var(--bif-yellow); }

        .song-info { flex: 1; min-width: 0; }
        .title { font-weight: 900; font-size: 18px; color: var(--bif-yellow); margin-bottom: 4px; text-transform: uppercase; }
        .path { font-size: 10px; color: rgba(255,255,255,0.5); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* DONG KNAP - SKAL VÆRE STOR */
        .copy-btn {
            background: var(--bif-yellow); color: #000; border: none;
            padding: 15px; border-radius: 15px; font-size: 14px; font-weight: 900; 
            width: 100%; text-transform: uppercase; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(253, 225, 0, 0.3);
        }
        .copy-btn:active { background: #fff; transform: scale(0.98); }

        /* FOOTER */
        .footer {
            position: fixed; bottom: 30px; left: 15px; right: 15px;
            background: rgba(0, 82, 158, 0.98);
            padding: 20px; border-radius: 40px;
            border: 3px solid var(--bif-yellow); z-index: 1000;
        }
        #search { 
            width: 100%; padding: 18px; border-radius: 25px; border: none;
            background: #ffffff; color: #000; font-size: 20px; font-weight: 900;
            text-align: center; outline: none; text-transform: uppercase;
        }
        .stat-text { text-align: center; font-size: 11px; color: var(--bif-yellow); margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="spotlight"></div>
    <div class="header">
        <img src="m_logo.PNG" class="header-logo">
        <h1 class="logo-text"><span class="miks">Miks</span><span class="musik">Musik</span></h1>
    </div>
    <div id="results"></div>
    <div class="footer">
        <div class="stat-text" id="stat">VESTEGNEN DONG-SYSTEM READY</div>
        <input type="text" id="search" placeholder="FIND DONG SANG..." onkeyup="handleSearch()" autocomplete="off">
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
            const queryWords = query.split(" ");
            const matches = mineSange.filter(s => {
                const sangeNavn = s.navn.toLowerCase();
                return queryWords.every(word => sangeNavn.includes(word));
            });
            renderResults(matches.slice(0, 20));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <img src="m_logo.PNG" class="cover-art">
                    <div class="song-info">
                        <div class="title">${s.navn}</div>
                        <div class="path">${s.sti}</div>
                        <button class="copy-btn" onclick="copyText('${s.sti.replace(/'/g, "\\'")}')">KLAR TIL DONG!</button>
                    </div>
                `;
                resultsDiv.appendChild(div);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            // Ingen irriterende alert her, bare en hurtig farve-ændring for hastighed
            document.getElementById('stat').innerText = "KOPIERET - FYR DEN AF!";
            setTimeout(() => { document.getElementById('stat').innerText = "VESTEGNEN DONG-SYSTEM READY"; }, 2000);
        }
    </script>
</body>
</html>
