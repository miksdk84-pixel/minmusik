<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiksMusik</title>
    <style>
        :root {
            /* Den fede rød/neon farve fra dit logo */
            --primary: #FF1B51; 
            --bg: #000000;
            --card: rgba(30, 30, 30, 0.9); /* Halv-gennemsigtig */
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg); 
            
            /* Læg logoet som en diskret mørk baggrund */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('f_logo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Billedet følger med, når du scroller */
            
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            padding-bottom: 20px;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 25px;
            backdrop-filter: blur(5px); /* Gør baggrunden sløret under headeren */
        }

        /* Det store logo øverst */
        .header-logo {
            width: 120px;
            height: 120px;
            display: block;
            margin: 10px auto 15px auto;
            object-fit: contain;
        }

        h2 { text-align: center; margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 0 15px var(--primary); }

        .count { text-align: center; font-size: 13px; color: var(--text-dim); margin: 5px 0 20px 0; }

        #search { 
            width: 100%; 
            padding: 18px 25px; 
            box-sizing: border-box;
            border-radius: 50px; /* Rigtig runde hjørner */
            border: 2px solid #333; 
            font-size: 18px;
            background: #1a1a1a; 
            color: white;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }

        #search:focus { border-color: var(--primary); background: #222; box-shadow: 0 0 20px var(--primary); }

        /* Sang-kortene */
        .song-item { 
            background: var(--card); 
            padding: 18px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: transform 0.1s;
        }

        .song-item:active { transform: scale(0.98); background: rgba(50, 50, 50, 0.9); }

        .title { 
            font-weight: 700; 
            display: block; 
            margin-bottom: 10px; 
            font-size: 17px; 
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary); /* Neon-effekt */
        }

        .path { 
            color: #ddd; 
            font-size: 12px; 
            word-break: break-all; 
            font-family: 'SF Mono', Menlo, monospace;
            line-height: 1.5;
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 8px;
            display: block;
            border: 1px solid #222;
        }

        .no-results {
            text-align: center;
            color: var(--text-dim);
            margin-top: 60px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="f_logo.png" alt="MiksMusik Logo" class="header-logo">
        <h2>🔥 MIKS MUSIK ARKIV</h2>
        <div id="stat" class="count">Indlæser database...</div>
        <input type="text" id="search" placeholder="Hvad skal vi høre, Micki?..." onkeyup="search()">
    </div>

    <div id="results"></div>

    <script src="musik_data.js"></script>
    <script>
        const statEl = document.getElementById('stat');
        const resultsDiv = document.getElementById('results');
        
        if (typeof mineSange !== 'undefined') {
            statEl.innerText = mineSange.length.toLocaleString() + " mp3-filer i din lomme";
        } else {
            statEl.innerText = "Fejl: Kunne ikke finde musik_data.js";
        }

        function search() {
            const query = document.getElementById('search').value.toLowerCase();
            resultsDiv.innerHTML = '';

            if (query.length < 2) return;

            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));

            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Ingen sange fundet...</div>';
                return;
            }

            // Vis de første 100 resultater
            matches.slice(0, 100).forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <span class="title">${s.navn}</span>
                    <span class="path">${s.sti}</span>
                `;
                resultsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
