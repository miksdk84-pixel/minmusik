<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE MUSIC COMMAND</title>
    <style>
        :root { --amber: #ff9d00; --bg: #000; --card: #111; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }

        header { padding: 30px 20px 10px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .m-logo { width: 45px; filter: drop-shadow(0 0 10px var(--amber)); }

        /* SØGEFELT - ALTID SYNLIGT */
        .search-area { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .search-box { background: #1a1a1a; border-radius: 15px; border: 1px solid #333; padding: 12px; display: flex; align-items: center; }
        #search { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 16px; outline: none; font-weight: 700; }

        /* QUICK-VIBE GENRE VÆLGER */
        .genre-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .genre-bar::-webkit-scrollbar { display: none; }
        .vibe-btn { 
            background: #111; border: 1px solid #333; color: #888; padding: 8px 18px; 
            border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .vibe-btn.active { background: var(--amber); color: #000; border-color: var(--amber); }

        /* RESULTAT LISTE */
        #results { padding: 10px 15px 100px; }
        .track-card { 
            background: var(--card); padding: 18px; border-radius: 18px; margin-bottom: 10px; 
            border: 1px solid #222; display: flex; flex-direction: column; transition: 0.1s;
        }
        .track-card:active { transform: scale(0.98); background: #1a1a1a; border-color: var(--amber); }
        .track-title { font-weight: 900; font-size: 14px; margin-bottom: 4px; color: var(--text); text-transform: uppercase; }
        .track-path { font-size: 9px; color: #444; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* BUND MENU */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(15,15,15,0.95); border-radius: 40px; border: 1px solid #333;
            padding: 5px; display: flex; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .nav-btn { flex: 1; border: none; background: transparent; color: #555; padding: 12px; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        .nav-btn.active { color: var(--amber); }
    </style>
</head>
<body>

<header><img src="m_logo.PNG" class="m-logo"></header>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="search" placeholder="SØG I ARKIVET..." onkeyup="filterTracks()" autocomplete="off">
    </div>
</div>

<div class="genre-bar">
    <div class="vibe-btn active" onclick="setVibe('', this)">ALLE</div>
    <div class="vibe-btn" onclick="setVibe('dansk', this)">🇩🇰 DANSK</div>
    <div class="vibe-btn" onclick="setVibe('house', this)">💃 HOUSE</div>
    <div class="vibe-btn" onclick="setVibe('remix', this)">🔥 REMIX</div>
    <div class="vibe-btn" onclick="setVibe('retro', this)">⏪ RETRO</div>
</div>

<div id="results"></div>

<div class="bottom-nav">
    <button class="nav-btn active">Search</button>
    <button class="nav-btn" onclick="alert('Requests kommer snart')">Requests</button>
    <button class="nav-btn" style="color:#ff3b3b" onclick="quickPanic()">SOS</button>
</div>

<script src="musik_data.js"></script>
<script>
    let currentVibe = '';

    function setVibe(vibe, el) {
        // Opdater knapper
        document.querySelectorAll('.vibe-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        
        currentVibe = vibe;
        filterTracks();
    }

    function filterTracks() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        const resultsDiv = document.getElementById('results');
        
        // Find matches baseret på både vibe og søgeord
        const matches = mineSange.filter(s => {
            const name = s.navn.toLowerCase();
            const path = s.sti.toLowerCase();
            const matchesQuery = name.includes(query) || path.includes(query);
            const matchesVibe = currentVibe === '' || name.includes(currentVibe) || path.includes(currentVibe);
            
            return matchesQuery && matchesVibe;
        });

        // Vis kun hvis der er søgt eller valgt en genre
        if (query.length < 2 && currentVibe === '') {
            resultsDiv.innerHTML = '<div style="text-align:center; color:#333; font-size:12px; padding-top:50px;">Skriv noget eller vælg en kategori</div>';
            return;
        }

        resultsDiv.innerHTML = matches.slice(0, 30).map(s => `
            <div class="track-card" onclick="copyPath('${s.sti.replace(/'/g, "\\'")}')">
                <div class="track-title">${s.navn}</div>
                <div class="track-path">${s.sti}</div>
            </div>
        `).join('');
    }

    function copyPath(path) {
        navigator.clipboard.writeText(path);
        // Lille visuel feedback
        const searchInput = document.getElementById('search');
        const oldPlaceholder = searchInput.placeholder;
        searchInput.placeholder = "KOPIERET!";
        setTimeout(() => { searchInput.placeholder = oldPlaceholder; }, 1000);
    }

    function quickPanic() {
        document.getElementById('search').value = "Banger";
        filterTracks();
    }

    // Start med tomt felt
    filterTracks();
</script>

</body>
</html>
