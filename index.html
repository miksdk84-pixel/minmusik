<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <style>
        :root { --gold: #ff9d00; --bg: #000; --border: rgba(255, 157, 0, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: 35%; background-position: center; background-repeat: no-repeat;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: -1; }

        header { padding: 55px 20px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-small { width: 22px; vertical-align: middle; margin-bottom: 4px; filter: drop-shadow(0 0 5px var(--gold)); }
        .app-title { font-weight: 800; font-size: 13px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }

        .trending-wrap { padding: 15px 20px 5px; flex-shrink: 0; }
        .trending-header { font-size: 8px; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; opacity: 0.7; }
        .trending-list { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .trending-list::-webkit-scrollbar { display: none; }
        .trending-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 12px; font-size: 11px; white-space: nowrap; 
            font-weight: 600; transition: 0.2s;
        }
        .trending-item:active { background: var(--gold); color: #000; transform: scale(0.95); }

        .controls { padding: 10px 20px 15px; position: relative; }
        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-box { 
            background: #111; border: 1px solid var(--border); border-radius: 14px; padding: 16px;
            width: 100%; color: #fff; font-size: 16px; font-weight: 600; outline: none; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .clear-btn {
            position: absolute; right: 15px; color: #444; font-size: 20px; font-weight: 800;
            padding: 10px; display: none;
        }

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .tab { 
            background: rgba(255,255,255,0.03); color: #555; padding: 10px 18px; border-radius: 20px; 
            font-size: 10px; font-weight: 800; white-space: nowrap; border: 1px solid transparent;
        }
        .tab.active { background: rgba(255, 157, 0, 0.1); color: var(--gold); border-color: var(--gold); }

        #results { flex-grow: 1; overflow-y: auto; padding: 0 15px 140px; }
        .track { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .track:active { background: rgba(255, 157, 0, 0.05); }
        .t-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 4px; display: block; }
        .t-path { font-size: 9px; color: #333; text-transform: uppercase; font-family: monospace; letter-spacing: 0.5px; }

        .copy-icon { opacity: 0.2; transition: 0.2s; }
        .copied .copy-icon { opacity: 1; stroke: var(--gold); transform: scale(1.2); }

        .dock { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #000 80%, transparent); padding: 20px 20px 50px; }
        .panic-btn { 
            background: var(--gold); color: #000; width: 100%; border: none; padding: 18px; 
            border-radius: 15px; font-weight: 900; font-size: 13px; letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(255, 157, 0, 0.3);
        }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" class="logo-small">
    <span class="app-title">MiksMusik Control</span>
</header>

<div class="trending-wrap">
    <div class="trending-header">Trending Top 10</div>
    <div class="trending-list" id="trending"></div>
</div>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" class="search-box" placeholder="Næste sang er ....." onkeyup="checkClear(); filter();" autocomplete="off">
        <div id="clearSearch" class="clear-btn" onclick="clearAll()">×</div>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="setVibe('', this)">Library</div>
    <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
    <div class="tab" onclick="setVibe('house', this)">House</div>
    <div class="tab" onclick="setVibe('remix', this)">Remix</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    function checkClear() {
        const val = document.getElementById('search').value;
        document.getElementById('clearSearch').style.display = val.length > 0 ? 'block' : 'none';
    }

    function clearAll() {
        document.getElementById('search').value = '';
        checkClear();
        filter();
    }

    function checkArchive(songTitle) {
        const cleanTitle = songTitle.replace(/^\d+\.\s*/, '').split(' - ')[0];
        document.getElementById('search').value = cleanTitle;
        checkClear();
        filter();
    }

    function fetchTrending() {
        const topHits = ["1. Espresso", "2. Birds of a Feather", "3. A Bar Song", "4. Million Dollar Baby", "5. Not Like Us", "6. Good Luck, Babe!", "7. I Had Some Help", "8. Please Please Please", "9. Too Sweet", "10. Lose Control"];
        document.getElementById('trending').innerHTML = topHits.map(h => `<div class="trending-item" onclick="checkArchive('${h}')">${h}</div>`).join('');
    }

    async function init() {
        fetchTrending();
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            filter();
        } catch (e) { console.log("Fejl"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div style="text-align:center; padding-top:60px; color:#111; font-weight:900; font-size:10px; letter-spacing:5px;">READY</div>';
            return;
        }
        const matches = db.filter(s => (s.navn + (s.sti || '')).toLowerCase().includes(q) && (s.navn + (s.sti || '')).toLowerCase().includes(vibe));
        if (matches.length === 0) { res.innerHTML = '<div style="text-align:center; padding-top:60px; color:var(--gold); font-size:10px; letter-spacing:2px;">MANGLER I ARKIV</div>'; return; }
        res.innerHTML = matches.slice(0, 40).map(s => `
            <div class="track" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0; padding-right:10px;">
                    <span class="t-name">${s.navn}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
                <svg class="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
        `).join('');
    }

    function copy(el, path) {
        navigator.clipboard.writeText(path);
        el.classList.add('copied');
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "STI KOPIERET!";
        setTimeout(() => { el.classList.remove('copied'); s.placeholder = old; }, 1000);
    }

    function panic() {
        document.getElementById('search').value = "";
        checkClear();
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
