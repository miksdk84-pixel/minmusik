<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" href="app_icon.png">
    
    <title>MiksMusik PRO</title>
    <style>
        :root {
            --primary: #FF1B51; /* Neon Rød */
            --bg: #000000;
            --card: rgba(20, 20, 20, 0.9);
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --header-height: 140px; /* Højde på bund-sektionen */
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg); 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('f_logo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            padding-bottom: calc(var(--header-height) + 20px); /* Plads til bund-baren */
            -webkit-font-smoothing: antialiased;
        }

        /* Resultat-området (nu i toppen) */
        #results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .song-item { 
            background: var(--card); padding: 20px; 
            border-radius: 15px; border: 1px solid #333; backdrop-filter: blur(5px);
            transition: all 0.1s;
        }

        .title { font-weight: 700; display: block; margin-bottom: 10px; font-size: 18px; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .path { color: #ddd; font-size: 12px; word-break: break-all; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; display: block; font-family: 'SF Mono', monospace; }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            background: #444; color: white; border: none; padding: 12px 16px;
            border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
            flex: 1; text-align: center;
        }
        .btn:active { background: var(--primary); }

        /* NY BUND-SEKTION (Søgebar, Logo & Info) */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            border-top: 2px solid var(--primary);
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .footer-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .footer-logo { width: 40px; height: 40px; object-fit: contain; }
        .count { font-size: 12px; color: var(--text-dim); }

        .search-wrapper { position: relative; width: 100%; max-width: 500px; }
        #search { 
            width: 100%; padding: 18px 50px 18px 25px; box-sizing: border-box;
            border-radius: 50px; border: 2px solid #333; font-size: 18px;
            background: #1a1a1a; color: white; outline: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        #search:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 27, 81, 0.5); }
        
        .clear-btn {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: #333; color: white; border: none; border-radius: 50%;
            width: 28px; height: 28px; font-size: 16px; cursor: pointer; display: none;
        }

        .no-results { text-align: center; color: var(--text-dim); margin-top: 60px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="results"></div>

    <div class="footer">
        <div class="footer-info">
            <img src="f_logo.png" alt="Logo" class="footer-logo">
            <div id="stat" class="count">Henter arkiv...</div>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Find min musik" onkeyup="handleSearch()">
            <button id="clearSearch" class="clear-btn" onclick="clearInput()">✕</button>
        </div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const clearBtn = document.getElementById('clearSearch');

        if (typeof mineSange !== 'undefined') {
            document.getElementById('stat').innerText = mineSange.length.toLocaleString() + " mp3-filer klar";
        }

        function clearInput() {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            resultsDiv.innerHTML = '';
            searchInput.focus();
        }

        function handleSearch() {
            const query = searchInput.value.toLowerCase();
            clearBtn.style.display = query.length > 0 ? 'block' : 'none';
            
            if (query.length < 2) {
                resultsDiv.innerHTML = '';
                return;
            }

            const queryWords = query.split(' ').filter(w => w.length > 0);
            const matches = mineSange.filter(s => {
                const navn = s.navn.toLowerCase();
                return queryWords.every(word => navn.includes(word));
            });

            renderResults(matches.slice(0, 100));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = songs.length === 0 ? '<div class="no-results">Intet fundet...</div>' : '';
            songs.forEach(s => {
                const folderPath = s.sti.substring(0, s.sti.lastIndexOf('/'));
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <span class="title" onclick="copyText('${s.sti.replace(/'/g, "\\'")}')">${s.navn}</span>
                    <span class="path">${s.sti}</span>
                    <div class="controls">
                        <button class="btn" onclick="copyText('${s.sti.replace(/'/g, "\\'")}')">📋 Kopiér Sti</button>
                        <button class="btn" onclick="showFolder('${folderPath.replace(/'/g, "\\'")}')">📂 Vis Mappe</button>
                    </div>
                `;
                resultsDiv.appendChild(div);
            });
        }

        function showFolder(path) {
            const folderSongs = mineSange.filter(s => s.sti.startsWith(path));
            searchInput.value = ""; 
            clearBtn.style.display = 'none';
            renderResults(folderSongs);
            window.scrollTo(0,0);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("Stien er kopieret til din udklipsholder!");
        }
    </script>
</body>
</html>
