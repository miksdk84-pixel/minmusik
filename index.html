<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="m_logo.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,900;1,400&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>M-ELITE PREDICTIVE</title>
    <style>
        :root { --amber: #ff9d00; --plat: #ffffff; --bg: #000; --ai-blue: #00ffff; --sos-red: #ff3b3b; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 157, 0, 0.1) 0%, transparent 60%), url('m_logo.PNG');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--plat); margin: 0; padding: 20px; padding-bottom: 120px;
        }

        /* FLYDENDE SOS KNAP - PLACERET SIKKERT ØVERST TIL HØJRE */
        .sos-btn { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            width: 70px; 
            height: 70px; 
            background: var(--sos-red); 
            border-radius: 50%; 
            border: 4px solid #fff; 
            color: white; 
            font-weight: 900; 
            font-size: 14px; 
            z-index: 2000;
            box-shadow: 0 0 30px rgba(255, 59, 59, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); }
        }

        .header { text-align: center; padding: 40px 0 20px; }
        .mode-indicator { font-size: 9px; letter-spacing: 3px; color: var(--amber); text-transform: uppercase; margin-bottom: 10px; font-weight: 900; opacity: 0.8; }

        /* PREDICTIVE AI PANEL */
        #aiPanel { 
            background: rgba(10, 10, 10, 0.95); 
            border-left: 4px solid var(--ai-blue); border-radius: 15px; 
            padding: 18px; margin-bottom: 20px; display: none;
            backdrop-filter: blur(20px);
        }
        .ai-status { font-size: 10px; color: var(--ai-blue); font-weight: 900; margin-bottom: 12px; }
        .ai-chip { background: rgba(0, 255, 255, 0.05); padding: 12px; border-radius: 12px; font-size: 13px; border: 1px solid rgba(0,255,255,0.1); margin-bottom: 8px; }

        /* LIST DESIGN */
        #results { display: flex; flex-direction: column; gap: 12px; }
        .song-item { background: rgba(25,25,25,0.95); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,157,0,0.15); }
        .title { font-weight: 900; font-size: 16px; color: var(--amber); margin-bottom: 5px; text-transform: uppercase; }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn { background: #fff; color: #000; border: none; padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 900; width: 100%; margin-top: 10px; }

        /* RENT SØGEFELT I BUNDEN */
        .footer { position: fixed; bottom: 25px; left: 15px; right: 15px; z-index: 1000; }
        .foot-wrap { background: rgba(15, 15, 15, 0.98); padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(30px); }
        #search { width: 100%; padding: 15px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 18px; text-align: center; outline: none; font-weight: 700; box-sizing: border-box; }
        
    </style>
</head>
<body>
    
    <button class="sos-btn" onclick="triggerSOS()">SOS</button>

    <div class="header">
        <div id="timeMode" class="mode-indicator">SYSTEM READY</div>
        <img src="m_logo.PNG" style="width: 75px; filter: drop-shadow(0 0 20px var(--amber));">
    </div>

    <div id="aiPanel">
        <div class="ai-status">PREDICTIVE AI ADVISOR</div>
        <div id="aiContent"></div>
    </div>

    <div id="results"></div>

    <div class="footer">
        <div class="foot-wrap">
            <input type="text" id="search" placeholder="SØG TRACK..." onkeyup="handleSearch()" autocomplete="off" spellcheck="false">
            <div id="stat" style="text-align: center; font-size: 9px; color: var(--amber); margin-top: 10px; font-weight: 800;">M-ELITE AI ACTIVE</div>
        </div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const searchInput = document.getElementById('search');
        const aiPanel = document.getElementById('aiPanel');
        const aiContent = document.getElementById('aiContent');

        function updateMode() {
            const hour = new Date().getHours();
            const modeText = document.getElementById('timeMode');
            if(hour >= 22 || hour <= 4) modeText.innerText = "⚡ PEAK HOUR MODE";
            else if(hour >= 18) modeText.innerText = "🍸 WARM-UP MODE";
            else modeText.innerText = "☕ LIBRARY MODE";
        }
        updateMode();

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length < 2) { resultsDiv.innerHTML = ''; aiPanel.style.display = 'none'; return; }
            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));
            renderResults(matches.slice(0, 20));
        }

        function renderResults(songs) {
            resultsDiv.innerHTML = '';
            songs.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<div class="title">${s.navn}</div><div class="path">${s.sti}</div><button class="btn" onclick="copyAction('${s.sti.replace(/'/g, "\\'")}', '${s.navn.replace(/'/g, "\\'")}')">KOPIÉR STI</button>`;
                resultsDiv.appendChild(div);
            });
        }

        function copyAction(path, name) {
            navigator.clipboard.writeText(path);
            aiPanel.style.display = 'block';
            const words = name.toLowerCase().split(' ').filter(w => w.length > 3);
            const recs = mineSange.filter(s => s.navn !== name && words.some(w => s.navn.toLowerCase().includes(w))).slice(0, 2);
            let html = '<div style="font-size:11px; opacity:0.6; margin-bottom:8px;">SPIL DEREFTER:</div>';
            recs.forEach(r => html += `<div class="ai-chip" onclick="quickS('${r.navn.replace(/'/g, "\\'")}')">🎯 ${r.navn}</div>`);
            aiContent.innerHTML = html;
            document.getElementById('stat').innerText = "COPIED!";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function quickS(n) { searchInput.value = n; handleSearch(); }

        function triggerSOS() { 
            const hour = new Date().getHours();
            let filter = (hour >= 22 || hour <= 4) ? /remix|club|hype|banger/ : /edit|club|clean/;
            const sos = mineSange.filter(s => s.navn.toLowerCase().match(filter)).slice(0, 15);
            renderResults(sos);
            document.getElementById('stat').innerText = "SOS LOADED!";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
