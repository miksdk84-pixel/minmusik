    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <style>
        :root {
            --gold: #c5a059;       /* Champagne Guld */
            --platinum: #e5e5e5;   /* Platin Hvid */

            --glass: rgba(255, 255, 255, 0.03);
            --header-height: 130px;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% -10%, rgba(197, 160, 89, 0.15) 0%, transparent 50%), url('m_logo.PNG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--platinum); 
            margin: 0; 
            padding: 20px;
            padding-bottom: calc(var(--header-height) + 40px);
            -webkit-font-smoothing: antialiased;
        }

        /* SPOTLIGHT EFFEKT */
        .spotlight {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 300px;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 60px 0 40px;
            position: relative;
            z-index: 2;
        }

        .header-logo {
            width: 110px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* ELEGANT LOGO TEKST */
        .logo-text {
            font-family: 'Bodoni Moda', serif;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .logo-text .miks {
            color: var(--platinum);
            font-style: italic;
            font-weight: 400;
        }

        .logo-text .musik {
            color: var(--gold);
            background: linear-gradient(to bottom, #f1d39b, #96702d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #results { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 2; }

        .song-item { 
            background: var(--glass); 
            padding: 16px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,215,0,0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .cover-art {
            width: 60px; height: 60px; border-radius: 12px;
            object-fit: cover; background: #111;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; color: var(--platinum); }
        .path { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; font-family: monospace; }

        .btn {
            background: rgba(255,255,255,0.03); color: var(--gold); border: 1px solid rgba(197,160,89,0.2);
            padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-top: 10px;
        }

        .footer {

            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
