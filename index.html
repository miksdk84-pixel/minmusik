<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE SPOTIFY STYLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --spotify-green: #1DB954; 
            --bg: #121212; 
            --card: #181818;
            --card-hover: #282828;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header { padding: 50px 20px 10px; flex-shrink: 0; }
        .app-title { font-weight: 800; font-size: 10px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }

        /* SEARCH AREA */
        .controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-wrap { 
            background: #242424; border-radius: 8px; padding: 12px 15px; 
            display: flex; align-items: center; border: 1px solid transparent;
        }
        .search-wrap:focus-within { border-color: #fff; }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 14px; font-weight: 600; outline: none;
        }

        /* TABS (PILLS) */
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: #2a2a2a; color: #fff; padding: 8px 16px; 
            border-radius: 20px; font-size: 12px; font-weight: 600; 
            white-space: nowrap; border: none;
        }
        .tab.active { background: var(--spotify-green); color: #000; }

        /* SPOTIFY GRID LAYOUT */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 10px 15px 120px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 kasser ved siden af hinanden */
            gap: 12px;
        }

        .track-card { 
            background: var(--card); padding: 15px; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: flex-end;
            aspect-ratio: 1 / 1; /* Gør kasserne kvadratiske */
            position: relative;
            transition: background 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Baggrunds-effekt i kassen (ligesom Spotify genrer) */
        .track-card::before {
            content: "";
            position: absolute;
            top: -20%; right: -20%;
            width: 80%; height: 80%;
            background: linear-gradient(135deg, var(--spotify-green) 0%, transparent 100%);
            opacity: 0.1;
            transform: rotate(20deg);
        }

        .track-card:active { background: var(--card-hover); transform: scale(0.96); }
        .track-card.copied { background: var(--spotify-green) !important; }
        .track-card.copied .t-name, .track-card.copied .t-path { color: #000; }
        
        .t-name { 
            font-weight: 700; font-size: 13px; color: #fff; 
            margin-bottom: 5px; z-index: 2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .t-path { 
            font-size: 8px; color: #b3b3b3; text-transform: uppercase; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 2;
        }

        /* BOTTOM DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, #000, transparent);
            padding: 20px 20px 40px; display: flex; justify-content: center; 
        }
        .panic-btn { 
            background: var(--spotify-green); color: #000; border: none;
            padding: 12px 30px; border-radius: 30px; font-weight: 800;
            font-size: 12px; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(29, 185, 84, 0.3);
        }

        .status { text-align: center; color: #555; grid-column: span 2; padding: 40px; font-size: 10px; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>

<header><div class="app-title">M-Elite Music</div></header>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Hvad vil du høre?" onkeyup="filter()" autocomplete="off">
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Alt</div>
        <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">House</div>
        <div class="tab" onclick="setVibe('remix', this)">Remix</div>
    </div>
</div>

<div id="results">
    <div class="status" id="status">INDLÆSER ARKIV...</div>
</div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // Vi beholder backup-linket så du har dine 9000+ sange
    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            document.getElementById('status').innerHTML = "KLAR TIL MIX (" + db.length + ")";
            filter();
        } catch (e) {
            document.getElementById('status').innerHTML = "SYSTEM FEJL";
        }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status">SØG ELLER VÆLG KATEGORI</div>';
            return;
        }

        const matches = db.filter(s => {
            const txt = ((s.navn || '') + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });

        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track-card" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div class="t-name">${s.navn || 'Ukendt'}</div>
                <div class="t-path">${s.sti || ''}</div>
            </div>
        `).join('');
    }

    function copy(el, p) {
        navigator.clipboard.writeText(p);
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 300);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
