<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE GRID AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --gold: #ff9d00;
            --deep: #350101;
            --bg-overlay: rgba(5, 5, 5, 0.94);
            --card: rgba(25, 25, 25, 0.65);
            --border: rgba(255, 157, 0, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: cover; background-position: center; background-attachment: fixed;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, #000 100%);
            z-index: -1;
        }

        header { 
            padding: 50px 20px 10px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .header-logo { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 5px var(--gold)); }
        .app-title { font-weight: 800; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }

        .controls { padding: 10px 20px 20px; flex-shrink: 0; }
        .search-wrap { 
            background: rgba(30, 30, 30, 0.8); border-radius: 16px; padding: 16px; 
            display: flex; align-items: center; border: 1px solid var(--border); transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .search-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 157, 0, 0.15); }
        #search { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; font-weight: 600; outline: none; text-align: center; }
        #search::placeholder { color: #666; font-style: italic; }

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; flex-shrink: 0; }
        .tab { 
            background: rgba(40, 40, 40, 0.8); color: #888; padding: 10px 18px; 
            border-radius: 25px; font-size: 11px; font-weight: 800; white-space: nowrap; border: none; transition: 0.2s;
        }
        .tab.active { background: var(--gold); color: #000; }

        /* MODERNE GRID LAYOUT */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 10px 20px 140px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Autofylder kasser */
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .track-card { 
            background: var(--card); border-radius: 16px; padding: 20px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: flex-start;
            aspect-ratio: 1.1 / 1; /* Gør dem næsten kvadratiske */
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        /* Gradient overlay for moderne dybde */
        .track-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .track-card:active { transform: scale(0.96); background: var(--accent-deep); }
        .track-card.copied { border-color: var(--gold); background: rgba(255, 157, 0, 0.1) !important; }
        
        .t-info { z-index: 2; width: 100%; }
        .t-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .t-path { font-size: 9px; color: #666; text-transform: uppercase; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

        /* Diskret kopi-ikon */
        .copy-icon {
            position: absolute; top: 15px; right: 15px; 
            color: rgba(255,255,255,0.1); z-index: 2; transition: 0.2s;
        }
        .track-card.copied .copy-icon { color: var(--gold); opacity: 1; }

        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 70%, transparent);
            padding: 20px 20px 50px; display: flex; justify-content: center; 
        }
        .panic-btn { 
            background: var(--gold); color: #000; padding: 16px 40px; 
            border-radius: 40px; font-weight: 800; font-size: 12px; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 157, 0, 0.3);
        }

        .status { text-align: center; color: #151515; grid-column: span 2; padding: 40px; font-size: 10px; font-weight: 900; letter-spacing: 4px; }
    </style>
</head>
<body>

<header>
    <img src="M_logo.png" alt="Logo" class="header-logo">
    <div class="app-title">MiksMusik Control</div>
</header>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="smartFilter()" autocomplete="off">
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="setVibe('', this)">Library</div>
    <div class="tab" onclick="setVibe('dansk', this)">Dansk</div>
    <div class="tab" onclick="setVibe('house', this)">House</div>
    <div class="tab" onclick="setVibe('remix', this)">Remix</div>
</div>

<div id="results">
    <div class="status" id="status">AI IS SCANNING 9000+ TRACKS...</div>
</div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';
    let fuse;

    // Vi beholder din recovery-logik
    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            
            // Initialiser Fuzzy Search (AI-lite)
            fuse = new Fuse(db, {
                keys: ['navn', 'sti'],
                threshold: 0.3, // Gør den "fuzzy"
                distance: 100
            });

            document.getElementById('status').innerHTML = "SYSTEM READY // " + db.length + " TRACKS";
            smartFilter();
        } catch (e) {
            document.getElementById('status').innerHTML = "SYSTEM ERROR";
        }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        smartFilter();
    }

    function smartFilter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status">AI IS READY FOR NEXT TRACK</div>';
            return;
        }

        let matches;
        if (q.length >= 2) {
            // BRUG FUZZY SEARCH
            const aiResults = fuse.search(q);
            matches = aiResults.map(r => r.item);
        } else {
            matches = db;
        }

        // Filter på genre (vibe)
        if (vibe) {
            matches = matches.filter(s => (s.navn + s.sti).toLowerCase().includes(vibe));
        }

        res.innerHTML = matches.slice(0, 30).map(s => `
            <div class="track-card" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div class="copy-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
                <div class="t-info">
                    <span class="t-name">${s.navn || 'Unknown'}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
            </div>
        `).join('');
    }

    function copy(el, p) {
        navigator.clipboard.writeText(p);
        el.classList.add('copied');
        const search = document.getElementById('search');
        const original = search.placeholder;
        search.placeholder = "AI COPIED TRACK!";
        setTimeout(() => { 
            el.classList.remove('copied');
            search.placeholder = old;
        }, 1000);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
