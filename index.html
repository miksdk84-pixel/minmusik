<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-ELITE MIDNIGHT PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00f2ff; /* Electric Cyan */
            --bg: #050505; 
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER MED NEON GLOW */
        header { 
            padding: 60px 20px 15px; 
            text-align: center; 
            background: linear-gradient(to bottom, rgba(0,242,255,0.05), transparent);
        }
        .app-title { 
            font-weight: 800; font-size: 11px; letter-spacing: 6px; 
            color: var(--accent); text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* SEARCH BOX - GLASSMORPHISM */
        .controls { padding: 10px 20px 25px; }
        .search-wrap { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border); 
            border-radius: 20px; padding: 18px; display: flex; align-items: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        #search { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 18px; font-weight: 600; outline: none; text-align: center;
        }
        #search::placeholder { color: rgba(255,255,255,0.2); }
        
        /* MODERN TABS */
        .tabs { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: var(--card); border: 1px solid var(--border); color: #666; 
            padding: 12px 24px; border-radius: 16px; font-size: 11px; 
            font-weight: 800; white-space: nowrap; text-transform: uppercase;
            transition: 0.3s;
        }
        .tab.active { 
            background: var(--accent); color: #000; border-color: var(--accent);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
        }

        /* TRACK LISTING */
        #results { 
            flex-grow: 1; overflow-y: auto; padding: 0 20px 150px; 
            -webkit-overflow-scrolling: touch;
        }
        .track { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 22px; margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s;
        }
        .track:active { transform: scale(0.95); background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        
        .t-name { font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 5px; display: block; }
        .t-path { font-size: 9px; color: rgba(255,255,255,0.2); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; display: block; }
        
        .copy-icon {
            width: 40px; height: 40px; background: rgba(255,255,255,0.03);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border);
        }

        /* FLOATING DOCK */
        .dock { 
            position: fixed; bottom: 35px; left: 25px; right: 25px; 
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
            border-radius: 35px; border: 1px solid var(--border); 
            padding: 12px; display: flex; justify-content: space-around; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
        }
        .dock-btn { border: none; background: transparent; color: #444; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .dock-btn.active { color: var(--accent); }

        .status-msg { text-align: center; margin-top: 100px; color: #111; font-weight: 900; font-size: 12px; letter-spacing: 8px; }
    </style>
</head>
<body>

<header><div class="app-title">M-Elite Pro Command</div></header>

<div class="controls">
    <div class="search-wrap"><input type="text" id="search" placeholder="HENTER ARKIV..." onkeyup="filter()" autocomplete="off"></div>
    <div class="tabs">
        <div class="tab active" onclick="setVibe('', this)">Library</div>
        <div class="tab" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
        <div class="tab" onclick="setVibe('house', this)">💃 House</div>
        <div class="tab" onclick="setVibe('remix', this)">🔥 Remix</div>
    </div>
</div>

<div id="results"><div class="status-msg" id="status">RECOVERING...</div></div>

<div class="dock">
    <button class="dock-btn active">Search</button>
    <button class="dock-btn" onclick="setVibe('2024', null)">New</button>
    <button class="dock-btn" style="color:#ff3b3b" onclick="location.reload(true)">Reset</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // VI BEHOLDER DIN RECOVERY LOGIK SÅ SANGENE IKKE FORSVINDER
    async function recoverData() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim();
            if (text.startsWith('const mineSange =')) { text = text.replace(/const mineSange\s*=\s*/, ''); }
            if (text.endsWith(';')) { text = text.slice(0, -1); }
            db = JSON.parse(text);
            statusEl.innerHTML = "PRO SYSTEM ACTIVE // " + db.length + " TRACKS";
            document.getElementById('search').placeholder = "Søg i " + db.length + " sange...";
            filter();
        } catch (e) {
            statusEl.innerHTML = "SYSTEM OFFLINE";
        }
    }

    function setVibe(v, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status-msg">READY TO MIX</div>';
            return;
        }
        const matches = db.filter(s => {
            const txt = ((s.navn || '') + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });
        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track" onclick="copyPath('${(s.sti || '').replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0; padding-right:10px;">
                    <span class="t-name">${s.navn || 'Unknown Track'}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
                <div class="copy-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${vibe ? '#00f2ff' : '#444'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </div>
            </div>
        `).join('');
    }

    function copyPath(p) {
        navigator.clipboard.writeText(p);
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "TRACK COPIED!";
        s.value = "";
        setTimeout(() => { s.placeholder = old; filter(); }, 800);
    }

    recoverData();
</script>

</body>
</html>
