<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiksMusik Arkiv</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        h2 { color: #00ff41; text-align: center; }
        #search { 
            width: 100%; padding: 15px; box-sizing: border-box;
            border-radius: 10px; border: none; font-size: 18px;
            margin-bottom: 20px; background: #333; color: white;
        }
        .song-item { 
            background: #252525; padding: 15px; margin-bottom: 10px; 
            border-radius: 8px; border-left: 4px solid #00ff41;
        }
        .title { font-weight: bold; display: block; margin-bottom: 5px; font-size: 16px; }
        .path { color: #aaa; font-size: 11px; word-break: break-all; font-family: monospace; }
        .count { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎵 MiksMusik Søger</h2>
        <div id="stat" class="count">Indlæser arkiv...</div>
        <input type="text" id="search" placeholder="Søg i sange..." onkeyup="search()">
        <div id="results"></div>
    </div>

    <script src="musik_data.js"></script>
    <script>
        document.getElementById('stat').innerText = "Arkiv klar: " + mineSange.length + " sange";

        function search() {
            const query = document.getElementById('search').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (query.length < 2) return;

            const matches = mineSange.filter(s => s.navn.toLowerCase().includes(query));

            matches.slice(0, 100).forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<span class="title">${s.navn}</span>
                                 <span class="path">${s.sti}</span>`;
                resultsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
